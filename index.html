<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V28.0 - Social</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --chat-font-size: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* TELAS DE LOGIN / CADASTRO */
        .auth-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; align-items: center; justify-content: center; z-index: 2000; color: white; padding: 20px; overflow-y: auto; }
        .auth-box { background: #0b4e41; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-box input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 12px; font-size: 16px; }
        .auth-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* BUSCA DE USUÁRIOS */
        #search-panel { position: absolute; left: -100%; top: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 600; transition: 0.3s ease; display: flex; flex-direction: column; }
        #search-panel.open { left: 0; }
        .search-header { background: #008069; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .search-input-area { padding: 15px; background: white; }
        .search-results { flex-grow: 1; overflow-y: auto; padding: 10px; }

        /* SIDEBAR E LISTAS */
        #sidebar { width: 30%; min-width: 300px; max-width: 450px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; height: 100%; position: relative; }
        #sidebar-header { background: #ededed; padding: 10px 15px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .tab-menu { display: flex; background: #ededed; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: bold; color: #666; }
        .tab-btn.active { border-bottom: 3px solid #008069; color: #008069; }

        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; background: #fff; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #ccc; }
        .user-info-text { display: flex; flex-direction: column; flex-grow: 1; }
        .btn-add { background: #008069; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* CHAT */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; z-index: 20; }
        #chat-header { background: #ededed; padding: 0 15px; height: 60px; display: flex; align-items: center; border-bottom: 1px solid #ddd; justify-content: space-between; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px 18px 10px; border-radius: 8px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; margin-bottom: 10px; font-size: var(--chat-font-size); }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; max-width: none; position: absolute; }
            #chat-area { width: 100%; position: absolute; transform: translateX(100%); transition: 0.3s; }
            body.chat-aberto #chat-area { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- TELA DE AUTENTICAÇÃO -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box" id="login-box">
            <h2 style="margin-top:0;">Zap Pro Login</h2>
            <input type="text" id="auth-at" placeholder="Seu @ (ex: @igor)">
            <input type="password" id="auth-pass" placeholder="Sua senha">
            <button onclick="realizarLogin()">ENTRAR</button>
            <p onclick="alternarAuth(true)" style="cursor:pointer; font-size:13px; margin-top:15px;">Não tem conta? <b>Cadastre-se</b></p>
        </div>

        <div class="auth-box" id="signup-box" style="display:none;">
            <h2 style="margin-top:0;">Criar Conta</h2>
            <img id="signup-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:10px;">
            <label style="display:block; background:#25d366; padding:8px; border-radius:5px; cursor:pointer; margin-bottom:10px; font-size:12px;" for="signup-foto">Escolher Foto</label>
            <input type="file" id="signup-foto" accept="image/*" style="display:none;" onchange="previewFoto(this, 'signup-preview')">
            
            <input type="text" id="reg-nome" placeholder="Seu Nome Visível">
            <input type="text" id="reg-at" placeholder="Crie seu @ (único)">
            <input type="password" id="reg-pass" placeholder="Crie uma senha">
            <button onclick="realizarCadastro()">CADASTRAR</button>
            <p onclick="alternarAuth(false)" style="cursor:pointer; font-size:13px; margin-top:15px;">Já tem conta? <b>Faça Login</b></p>
        </div>
    </div>

    <div id="app-container" style="display:none; width:100%; height:100%;">
        <!-- SIDEBAR -->
        <div id="sidebar">
            <!-- PAINEL DE BUSCA -->
            <div id="search-panel">
                <div class="search-header">
                    <span style="cursor:pointer;" onclick="toggleSearch()">❮</span>
                    <span>Procurar Pessoas</span>
                </div>
                <div class="search-input-area">
                    <input type="text" id="search-input" placeholder="Digite o @ ou nome..." style="width:100%; padding:10px; border:1px solid #ddd; border-radius:20px;" oninput="buscarUsuarios(this.value)">
                </div>
                <div id="search-results" class="search-results"></div>
            </div>

            <div id="sidebar-header">
                <img id="minha-foto-header" src="" style="width:35px; height:35px; border-radius:50%;">
                <span id="meu-at-header" style="font-weight:bold; font-size:14px;"></span>
                <span style="cursor:pointer; font-size:18px;" onclick="toggleSearch()">🔍</span>
            </div>

            <div class="tab-menu">
                <button class="tab-btn active" onclick="mudarTab('amigos', this)">AMIGOS</button>
                <button class="tab-btn" onclick="mudarTab('convites', this)">CONVITES <span id="count-convites" style="background:red; color:white; border-radius:50%; padding:2px 6px; display:none;">0</span></button>
            </div>

            <ul id="main-list" style="list-style:none; padding:0; margin:0; overflow-y:auto; flex-grow:1;"></ul>
        </div>

        <!-- CHAT -->
        <div id="chat-area">
            <div id="chat-header">
                <div style="display:flex; align-items:center;">
                    <button class="back-btn" onclick="document.body.classList.remove('chat-aberto')">❮</button>
                    <span id="chat-nome-contato" style="font-weight:bold;">Selecione um chat</span>
                </div>
                <button id="btn-remover-amigo" style="display:none; background:none; border:none; color:red; cursor:pointer; font-size:12px;" onclick="removerAmigo()">Remover Amigo</button>
            </div>
            <ul id="messages"></ul>
            <div id="footer-container" style="display:none; background:#f0f0f0; padding:10px; border-top:1px solid #ddd;">
                <form id="form" onsubmit="enviarMensagem(event)" style="display:flex; gap:8px;">
                    <input id="input" placeholder="Mensagem..." style="flex:1; border:none; padding:12px; border-radius:25px;">
                    <button type="submit" style="background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%;">➤</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuUsuario = null; // Objeto com todos os dados do logado
        let tabAtual = 'amigos';
        let chatAtivoId = null;
        let fotoBase64 = "";

        // --- AUTH & LOGIN ---
        function alternarAuth(showSignup) {
            document.getElementById('login-box').style.display = showSignup ? 'none' : 'block';
            document.getElementById('signup-box').style.display = showSignup ? 'block' : 'none';
        }

        function previewFoto(input, target) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    document.getElementById(target).src = e.target.result;
                    fotoBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function realizarCadastro() {
            const nome = document.getElementById('reg-nome').value.trim();
            const at = document.getElementById('reg-at').value.trim().toLowerCase().replace('@','');
            const pass = document.getElementById('reg-pass').value.trim();
            if(!nome || !at || !pass) return alert("Preencha tudo!");

            db.ref('usuarios/' + at).once('value', s => {
                if(s.exists()) return alert("Este @ já está em uso!");
                const novoUser = { nome, at: '@'+at, senha: pass, foto: fotoBase64 || "https://cdn-icons-png.flaticon.com/512/149/149071.png" };
                db.ref('usuarios/' + at).set(novoUser).then(() => {
                    alert("Conta criada!");
                    alternarAuth(false);
                });
            });
        }

        function realizarLogin() {
            const at = document.getElementById('auth-at').value.trim().toLowerCase().replace('@','');
            const pass = document.getElementById('auth-pass').value.trim();

            db.ref('usuarios/' + at).once('value', s => {
                const user = s.val();
                if(user && user.senha === pass) {
                    meuUsuario = { ...user, id: at };
                    entrarNoApp();
                } else {
                    alert("Usuário ou senha incorretos.");
                }
            });
        }

        function entrarNoApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('minha-foto-header').src = meuUsuario.foto;
            document.getElementById('meu-at-header').innerText = meuUsuario.at;
            carregarListas();
        }

        // --- SISTEMA DE BUSCA & AMIZADES ---
        function toggleSearch() { document.getElementById('search-panel').classList.toggle('open'); }

        function buscarUsuarios(termo) {
            const results = document.getElementById('search-results');
            results.innerHTML = "";
            if(termo.length < 2) return;

            db.ref('usuarios').once('value', s => {
                s.forEach(child => {
                    const user = child.val();
                    const id = child.key;
                    if(id === meuUsuario.id) return;
                    
                    if(user.at.includes(termo) || user.nome.toLowerCase().includes(termo.toLowerCase())) {
                        const div = document.createElement('div');
                        div.className = "user-item";
                        div.innerHTML = `
                            <img src="${user.foto}" class="avatar">
                            <div class="user-info-text">
                                <b>${user.nome}</b>
                                <small>${user.at}</small>
                            </div>
                            <button class="btn-add" onclick="enviarSolicitacao('${id}')">Adicionar</button>
                        `;
                        results.appendChild(div);
                    }
                });
            });
        }

        function enviarSolicitacao(idDestino) {
            db.ref(`convites/${idDestino}/${meuUsuario.id}`).set({
                nome: meuUsuario.nome,
                at: meuUsuario.at,
                foto: meuUsuario.foto
            }).then(() => { alert("Convite enviado!"); toggleSearch(); });
        }

        function aceitarConvite(idOrigem) {
            // Pega dados de quem enviou
            db.ref('usuarios/' + idOrigem).once('value', s => {
                const userOrigem = s.val();
                // Add na minha lista
                db.ref(`amigos/${meuUsuario.id}/${idOrigem}`).set({ nome: userOrigem.nome, at: userOrigem.at, foto: userOrigem.foto });
                // Add na lista dele
                db.ref(`amigos/${idOrigem}/${meuUsuario.id}`).set({ nome: meuUsuario.nome, at: meuUsuario.at, foto: meuUsuario.foto });
                // Remove convite
                db.ref(`convites/${meuUsuario.id}/${idOrigem}`).remove();
            });
        }

        function removerAmigo() {
            if(!confirm("Remover amizade? Você não poderá mais conversar até adicionar novamente.")) return;
            const idAmigo = chatAtivoId;
            db.ref(`amigos/${meuUsuario.id}/${idAmigo}`).remove();
            db.ref(`amigos/${idAmigo}/${meuUsuario.id}`).remove();
            // Limpa chat local
            document.body.classList.remove('chat-aberto');
            chatAtivoId = null;
        }

        // --- GERENCIAMENTO DE TABS ---
        function mudarTab(tab, btn) {
            tabAtual = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            carregarListas();
        }

        function carregarListas() {
            const list = document.getElementById('main-list');
            list.innerHTML = "";

            if(tabAtual === 'amigos') {
                db.ref('amigos/' + meuUsuario.id).on('value', s => {
                    list.innerHTML = "";
                    s.forEach(child => {
                        const amg = child.val();
                        const li = document.createElement('li');
                        li.className = "user-item";
                        li.onclick = () => abrirChat(child.key, amg.nome);
                        li.innerHTML = `
                            <img src="${amg.foto}" class="avatar">
                            <div class="user-info-text">
                                <b>${amg.nome}</b>
                                <small>${amg.at}</small>
                            </div>
                        `;
                        list.appendChild(li);
                    });
                });
            } else {
                db.ref('convites/' + meuUsuario.id).on('value', s => {
                    list.innerHTML = "";
                    const count = s.numChildren();
                    document.getElementById('count-convites').innerText = count;
                    document.getElementById('count-convites').style.display = count > 0 ? 'inline' : 'none';
                    
                    s.forEach(child => {
                        const conv = child.val();
                        const li = document.createElement('li');
                        li.className = "user-item";
                        li.innerHTML = `
                            <img src="${conv.foto}" class="avatar">
                            <div class="user-info-text">
                                <b>${conv.nome}</b>
                                <small>${conv.at}</small>
                            </div>
                            <button class="btn-add" onclick="aceitarConvite('${child.key}')">Aceitar</button>
                        `;
                        list.appendChild(li);
                    });
                });
            }
        }

        // --- CHAT ---
        function abrirChat(id, nome) {
            chatAtivoId = id;
            document.getElementById('chat-nome-contato').innerText = nome;
            document.getElementById('footer-container').style.display = 'block';
            document.getElementById('btn-remover-amigo').style.display = 'block';
            document.body.classList.add('chat-aberto');
            carregarMensagens();
        }

        function carregarMensagens() {
            const chatPath = [meuUsuario.id, chatAtivoId].sort().join('_');
            db.ref('chats/' + chatPath).on('value', s => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                s.forEach(child => {
                    const msg = child.val();
                    const li = document.createElement('li');
                    li.className = "msg " + (msg.sender === meuUsuario.id ? 'sent' : 'received');
                    li.innerText = msg.texto;
                    box.appendChild(li);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function enviarMensagem(e) {
            e.preventDefault();
            const txt = document.getElementById('input').value.trim();
            if(!txt) return;
            const chatPath = [meuUsuario.id, chatAtivoId].sort().join('_');
            db.ref('chats/' + chatPath).push({ texto: txt, sender: meuUsuario.id });
            document.getElementById('input').value = "";
        }
    </script>
</body>
</html>
