<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V19.1 - Final GIF Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; }
        .login-box { background: #0b4e41; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        #login-screen input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 15px; font-size: 16px; width: 100%; }
        
        #app-container { display: none; width: 100%; height: 100%; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; }
        #sidebar-header { background: #ededed; padding: 15px; font-weight: bold; height: 60px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        #user-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; cursor: pointer; background: #fff; width: 100%; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #ccc; }

        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; z-index: 20; }
        #chat-header { background: #ededed; padding: 0 10px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; justify-content: space-between; }
        .header-left { display: flex; align-items: center; }
        .back-btn { background: #075e54; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; margin-right: 8px; font-size: 18px; cursor: pointer; display: none; align-items: center; justify-content: center; }
        
        .header-btns { display: flex; align-items: center; gap: 6px; }
        .btn-h { border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; }

        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg-line { display: flex; align-items: center; margin-bottom: 8px; width: 100%; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: #dcf8c6; margin-left: auto; }
        .received { background: #fff; margin-right: auto; }
        
        .sticker-msg { background: none !important; box-shadow: none !important; padding: 0 !important; }
        .msg img { max-width: 150px; border-radius: 8px; display: block; }

        #footer-container { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; position: relative; }
        #edit-banner { display: none; background: #dcf8c6; padding: 5px 15px; font-size: 12px; color: #075e54; font-weight: bold; }
        #form { display: flex; align-items: center; gap: 5px; }
        
        /* CAMPO DE TEXTO ESPECIAL PARA ACEITAR GIFs DO TECLADO */
        #input { 
            flex-grow: 1; border: none; padding: 12px; border-radius: 20px; 
            outline: none; font-size: 16px; background: white; 
            max-height: 100px; overflow-y: auto; min-height: 42px;
        }
        
        .btn-circle { background: #075e54; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .btn-media { background: none; border: none; font-size: 22px; cursor: pointer; color: #54656f; padding: 0 4px; display: flex; align-items: center; }

        #recording-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f0f0; display: none; align-items: center; padding: 0 15px; z-index: 50; }
        .timer-text { color: red; font-weight: bold; flex-grow: 1; margin-left: 10px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; }
            #chat-area { width: 100%; position: absolute; height: 100%; left: 100%; transition: 0.2s; }
            body.chat-aberto #chat-area { left: 0; }
            .back-btn { display: flex; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Zap Pro</h2>
            <img id="preview-img" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; display:none; margin:10px auto; border:3px solid #fff;">
            <input type="text" id="login-nome" placeholder="Seu nome">
            <label style="display:block; background:#25d366; padding:12px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-weight:bold; text-align:center;" for="login-foto">📸 Foto Perfil</label>
            <input type="file" id="login-foto" accept="image/*" style="display:none;" onchange="previewFoto(this)">
            <button onclick="fazerLogin()" style="width:100%; padding:15px; border-radius:8px; border:none; background:#25d366; color:white; font-weight:bold;">ENTRAR</button>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div id="sidebar-header">Conversas</div>
            <ul id="user-list" onclick="detectarToque(event)"></ul>
        </div>
        <div id="chat-area">
            <div id="chat-header">
                <div class="header-left">
                    <button class="back-btn" onclick="document.body.classList.remove('chat-aberto')">❮</button>
                    <span id="nome-contato">Selecione um contato</span>
                </div>
                <div class="header-btns" id="header-btns" style="display:none;">
                    <button class="btn-h" id="h-correct" style="background:#25d366; color:white; display:none;" onclick="prepararCorrecao()">📝 Corrigir</button>
                    <button class="btn-h" id="h-del" style="background:#ff3b30; color:white; display:none;" onclick="apagarSelecionadas()">🗑️</button>
                    <button class="btn-h" style="background:#075e54; color:white" id="h-pencil" onclick="ativarEdicao()">✏️</button>
                    <button class="btn-h" style="background:#888; color:white; display:none" id="h-cancel" onclick="desativarEdicao()">Sair</button>
                </div>
            </div>

            <ul id="messages"></ul>

            <div id="footer-container" style="display: none;">
                <div id="edit-banner">✏️ Corrigindo... <span onclick="cancelarEdicaoDirect()" style="float:right; cursor:pointer;">✖</span></div>
                
                <div id="form">
                    <label class="btn-media">🖼️ <input type="file" accept="image/*" style="display:none" onchange="enviarArquivo(this, 'foto')"></label>
                    <label class="btn-media">📷 <input type="file" accept="image/*" capture="environment" style="display:none" onchange="enviarArquivo(this, 'foto')"></label>
                    <label class="btn-media">📂 <input type="file" accept="image/gif,image/png,image/webp" style="display:none" onchange="enviarArquivo(this, 'sticker')"></label>

                    <div id="input" contenteditable="true" placeholder="Digite uma mensagem..."></div>
                    
                    <button class="btn-circle" onclick="processarEnvio()">➤</button>
                    <button class="btn-circle" onclick="iniciarGravacao()">🎤</button>
                </div>

                <div id="recording-ui">
                    <button style="background:none; border:none; font-size:24px;" onclick="cancelarGravacao()">🗑️</button>
                    <div style="width:10px; height:10px; background:red; border-radius:50%; margin:0 10px; animation: blink 1s infinite;"></div>
                    <div id="timer-display" class="timer-text">0:00</div>
                    <button class="btn-circle" style="background:#00a884" onclick="pararESEnviar()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone",
            storageBucket: "meu-zap-clone.firebasestorage.app",
            messagingSenderId: "972529173490",
            appId: "1:972529173490:web:b8444d778ebe5ed897216b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome, minhaFotoBase64, meuId, chatAtivo, mediaRecorder, audioChunks = [], timerInterval, segundos = 0, gravacaoCancelada = false, idEditando = null;

        // --- LÓGICA DE INPUT RICO (GIFs do Teclado) ---
        const inputDiv = document.getElementById('input');

        inputDiv.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    e.preventDefault();
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        db.ref('chats/' + chatAtivo).push({ arquivo: event.target.result, sender: meuId, tipo: 'sticker', excluida: false });
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });

        // Limpa formatação ao colar texto
        inputDiv.addEventListener('paste', function(e) {
            if (e.clipboardData.getData('text/plain')) {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            }
        });

        function processarEnvio() {
            const texto = inputDiv.innerText.trim();
            if (!texto && !idEditando) return;
            if (idEditando) {
                db.ref('chats/' + chatAtivo + '/' + idEditando).update({ texto: texto, editada: true });
                cancelarEdicaoDirect();
            } else {
                db.ref('chats/' + chatAtivo).push({ texto: texto, sender: meuId, tipo: 'texto', excluida: false });
            }
            inputDiv.innerText = '';
        }

        // --- RESTANTE DAS FUNÇÕES ---
        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById('preview-img').src = e.target.result; document.getElementById('preview-img').style.display = 'block'; minhaFotoBase64 = e.target.result; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        if(localStorage.getItem('zap_id')) { fazerLogin(true); }

        function fazerLogin(automatico = false) {
            if(!automatico) {
                meuNome = document.getElementById('login-nome').value.trim();
                if(!meuNome) return;
                minhaFotoBase64 = minhaFotoBase64 || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                meuId = meuNome.toLowerCase().replace(/\s/g, '');
                localStorage.setItem('zap_nome', meuNome); localStorage.setItem('zap_foto', minhaFotoBase64); localStorage.setItem('zap_id', meuId);
            } else {
                meuNome = localStorage.getItem('zap_nome'); minhaFotoBase64 = localStorage.getItem('zap_foto'); meuId = localStorage.getItem('zap_id');
            }
            db.ref('usuarios/' + meuId).update({ nome: meuNome, foto: minhaFotoBase64 });
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            iniciarSistema();
        }

        function iniciarSistema() {
            db.ref('online/' + meuId).set(true); db.ref('online/' + meuId).onDisconnect().remove();
            db.ref('usuarios').on('value', snapshot => {
                const userList = document.getElementById('user-list'); userList.innerHTML = '';
                snapshot.forEach(child => {
                    if(child.key !== meuId) {
                        const user = child.val();
                        const li = document.createElement('li'); li.className = 'user-item'; li.setAttribute('data-id', child.key); li.setAttribute('data-nome', user.nome);
                        li.innerHTML = `<img src="${user.foto}" class="avatar" style="width:45px; height:45px; border-radius:50%; margin-right:15px; object-fit:cover;"><span>${user.nome}</span>`; userList.appendChild(li);
                    }
                });
            });
        }

        function detectarToque(event) {
            const item = event.target.closest('.user-item');
            if (item) abrirChat(item.getAttribute('data-id'), item.getAttribute('data-nome'));
        }

        function abrirChat(idDestino, nomeDestino) {
            chatAtivo = [meuId, idDestino].sort().join('_');
            document.getElementById('nome-contato').innerText = nomeDestino;
            document.getElementById('footer-container').style.display = 'block';
            document.getElementById('header-btns').style.display = 'flex';
            document.body.classList.add('chat-aberto');
            desativarEdicao(); carregarMensagens();
        }

        function carregarMensagens() {
            const mList = document.getElementById('messages');
            db.ref('chats/' + chatAtivo).off();
            db.ref('chats/' + chatAtivo).on('value', snapshot => {
                mList.innerHTML = '';
                snapshot.forEach(child => {
                    const msg = child.val(); const isSent = msg.sender === meuId;
                    const line = document.createElement('li'); line.className = 'msg-line ' + (isSent ? 'sent-line' : 'received-line');
                    let msgClass = "msg " + (isSent ? "sent" : "received");
                    let content = "";
                    if(msg.excluida) content = `<span style="font-style:italic;color:#888;">🚫 Apagada</span>`;
                    else if(msg.tipo === 'foto') { content = `<img src="${msg.arquivo}" style="max-width:100%; border-radius:8px;">`; }
                    else if(msg.tipo === 'sticker') { msgClass += " sticker-msg"; content = `<img src="${msg.arquivo}">`; }
                    else if(msg.tipo === 'audio') content = `<audio controls src="${msg.audio}"></audio>`;
                    else content = msg.texto;
                    if(msg.editada && !msg.excluida) content += ` <small style="font-size:10px; color:#888;">(editada)</small>`;
                    line.innerHTML = `<input type="checkbox" class="select-check" style="display:none; width:20px; height:20px; margin-right:10px;" data-id="${child.key}" data-texto="${msg.texto || ''}" data-tipo="${msg.tipo}">
                                      <div class="${msgClass}">${content}</div>`;
                    mList.appendChild(line);
                });
                mList.scrollTop = mList.scrollHeight;
            });
        }

        function enviarArquivo(input, tipo) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { db.ref('chats/' + chatAtivo).push({ arquivo: e.target.result, sender: meuId, tipo: tipo, excluida: false }); };
                reader.readAsDataURL(input.files[0]); input.value = "";
            }
        }

        function ativarEdicao() {
            document.body.classList.add('edit-mode');
            document.getElementById('h-pencil').style.display = 'none';
            document.getElementById('h-cancel').style.display = 'block';
            document.getElementById('h-del').style.display = 'block';
            document.getElementById('h-correct').style.display = 'block';
            document.querySelectorAll('.select-check').forEach(c => c.style.display = 'block');
        }

        function desativarEdicao() {
            document.body.classList.remove('edit-mode');
            document.getElementById('h-pencil').style.display = 'block';
            document.getElementById('h-cancel').style.display = 'none';
            document.getElementById('h-del').style.display = 'none';
            document.getElementById('h-correct').style.display = 'none';
            document.querySelectorAll('.select-check').forEach(c => { c.style.display = 'none'; c.checked = false; });
        }

        function prepararCorrecao() {
            const sel = document.querySelector('.sent-line .select-check:checked'); if(!sel) return alert("Selecione sua mensagem.");
            idEditando = sel.dataset.id; inputDiv.innerText = sel.dataset.texto;
            document.getElementById('edit-banner').style.display = 'block'; inputDiv.focus(); desativarEdicao();
        }

        function cancelarEdicaoDirect() { idEditando = null; inputDiv.innerText = ''; document.getElementById('edit-banner').style.display = 'none'; }

        function apagarSelecionadas() {
            const sel = document.querySelectorAll('.sent-line .select-check:checked');
            if (confirm(`Apagar ${sel.length} mensagens?`)) { sel.forEach(box => { db.ref('chats/' + chatAtivo + '/' + box.dataset.id).update({ excluida: true, texto: null, audio: null, arquivo: null }); }); desativarEdicao(); }
        }

        async function iniciarGravacao() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(stream); audioChunks = []; gravacaoCancelada = false;
                mediaRecorder.ondataavailable = e => { if (!gravacaoCancelada) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => { if(!gravacaoCancelada && audioChunks.length > 0) { const blob = new Blob(audioChunks, { type: 'audio/webm' }); const reader = new FileReader(); reader.onloadend = () => db.ref('chats/' + chatAtivo).push({ audio: reader.result, sender: meuId, tipo: 'audio', excluida: false }); reader.readAsDataURL(blob); } };
                mediaRecorder.start(); document.getElementById('recording-ui').style.display = 'flex'; segundos = 0;
                timerInterval = setInterval(() => { segundos++; const min = Math.floor(segundos/60); const seg = segundos%60; document.getElementById('timer-display').innerText = `${min}:${seg < 10 ? '0' : ''}${seg}`; }, 1000);
            } catch (err) { alert("Ative o microfone."); }
        }
        function cancelarGravacao() { if (mediaRecorder) { gravacaoCancelada = true; audioChunks = []; mediaRecorder.stop(); fecharUI(); } }
        function pararESEnviar() { if (mediaRecorder) { gravacaoCancelada = false; mediaRecorder.stop(); fecharUI(); } }
        function fecharUI() { clearInterval(timerInterval); document.getElementById('recording-ui').style.display = 'none'; }
    </script>
</body>
</html>
