<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V29.8</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --chat-font-size: 15px; } /* Variável controlada pelo Painel */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #075e54; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* LOADING SCREEN */
        #loading-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; align-items: center; justify-content: center; z-index: 3000; color: white; font-weight: bold; flex-direction: column; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid #fff; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* AUTH SCREENS */
        .auth-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: none; align-items: center; justify-content: center; z-index: 2000; color: white; padding: 20px; }
        .auth-box { background: #0b4e41; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        .auth-box input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 12px; font-size: 16px; color: #333; width: 100%; }
        .auth-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; }

        /* APP MAIN */
        #app-container { display: none; width: 100%; height: 100%; background: #fff; }
        #sidebar { width: 30%; min-width: 300px; max-width: 450px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; position: relative; }
        
        /* PAINÉIS LATERAIS */
        #settings-panel, #search-panel { position: absolute; left: -100%; top: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 100; transition: 0.3s ease; display: flex; flex-direction: column; }
        #settings-panel.open, #search-panel.open { left: 0; }
        .panel-header { background: #008069; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }

        /* LISTA E MENSAGENS */
        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; gap: 12px; cursor: pointer; background: #fff; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #ccc; }
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px 18px 10px; border-radius: 8px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; margin-bottom: 10px; font-size: var(--chat-font-size); min-width: 90px; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; }
            #chat-area { width: 100%; position: absolute; transform: translateX(100%); transition: 0.3s; }
            body.chat-aberto #chat-area { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div><span>Carregando Zap Pro...</span></div>

    <div id="auth-screen" class="auth-screen">
        <div class="auth-box" id="login-box">
            <h2>Zap Pro</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button onclick="realizarLogin()">ENTRAR</button>
            <p onclick="alternarAuth('signup')" style="cursor:pointer; font-size:12px; margin-top:15px;">Novo aqui? <b>Cadastre-se</b></p>
        </div>
        <div class="auth-box" id="signup-box" style="display:none;">
            <h2>Criar Conta</h2>
            <input type="text" id="reg-nome" placeholder="Apelido">
            <input type="text" id="reg-at" placeholder="Seu @ (ex: igor.designer)">
            <input type="email" id="reg-email" placeholder="E-mail real">
            <input type="password" id="reg-pass" placeholder="Senha">
            <button onclick="registrarUsuario()">CADASTRAR</button>
            <p onclick="alternarAuth('login')" style="cursor:pointer; font-size:12px; margin-top:15px;">Já tem conta? <b>Login</b></p>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <!-- PAINEL CONFIGS -->
            <div id="settings-panel">
                <div class="panel-header"><span style="cursor:pointer;" onclick="toggleSettings()">❮</span><span>Meu Perfil</span></div>
                <div style="text-align:center; padding:20px; background:#fff;">
                    <img id="set-foto-preview" src="" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid #25d366; cursor:pointer;" onclick="document.getElementById('set-foto-input').click()">
                    <input type="file" id="set-foto-input" accept="image/*" style="display:none;" onchange="uploadFoto(this)">
                </div>
                <div style="padding:20px;">
                    <label style="font-size:12px; color:#008069; font-weight:bold;">APELIDO</label>
                    <input type="text" id="set-nome-input" style="width:100%; border:none; border-bottom:2px solid #008069; padding:10px 0; margin-bottom:20px; font-size:16px;">
                    
                    <!-- NOVO: TAMANHO DA FONTE -->
                    <label style="font-size:12px; color:#008069; font-weight:bold;">TAMANHO DA FONTE: <span id="font-val">15px</span></label>
                    <input type="range" min="12" max="25" value="15" id="font-range" style="width:100%; margin:15px 0;" oninput="alterarFonte(this.value)">
                    
                    <button onclick="salvarPerfil()" style="width:100%; padding:15px; background:#25d366; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SALVAR ALTERAÇÕES</button>
                    <button onclick="fazerLogout()" style="width:100%; margin-top:30px; padding:10px; background:none; border:1px solid #ff4d4d; color:#ff4d4d; border-radius:8px; font-weight:bold;">SAIR DA CONTA</button>
                </div>
            </div>

            <div id="search-panel">
                <div class="panel-header"><span style="cursor:pointer;" onclick="toggleSearch()">❮</span><span>Buscar Usuários</span></div>
                <div style="padding:15px; background:#fff;"><input type="text" placeholder="Pesquisar @ ou nome..." style="width:100%; padding:10px; border-radius:20px; border:1px solid #ddd;" oninput="buscarUsuarios(this.value)"></div>
                <div id="search-results"></div>
            </div>

            <div style="background:#ededed; height:60px; padding:0 15px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #ddd;">
                <div style="display:flex; align-items:center; gap:10px;"><img id="minha-foto-topo" src="" style="width:35px; height:35px; border-radius:50%;"><span id="meu-nome-topo" style="font-weight:bold;"></span></div>
                <div style="display:flex; gap:15px;"><span style="cursor:pointer; font-size:20px;" onclick="toggleSearch()">🔍</span><span style="cursor:pointer; font-size:20px;" onclick="toggleSettings()">⚙️</span></div>
            </div>
            
            <div style="display:flex; background:#ededed; border-bottom:1px solid #ddd;">
                <button style="flex:1; padding:12px; border:none; background:none; cursor:pointer; font-weight:bold; color:#666;" onclick="mudarTab('amigos')">AMIGOS</button>
                <button style="flex:1; padding:12px; border:none; background:none; cursor:pointer; font-weight:bold; color:#666;" onclick="mudarTab('convites')">CONVITES</button>
            </div>
            <ul id="main-list" style="list-style:none; padding:0; margin:0; overflow-y:auto; flex-grow:1;"></ul>
        </div>

        <div id="chat-area">
            <div style="background:#ededed; height:60px; padding:0 15px; display:flex; align-items:center; border-bottom:1px solid #ddd;">
                <button style="background:none; border:none; font-size:20px; margin-right:10px; cursor:pointer;" onclick="document.body.classList.remove('chat-aberto')">❮</button>
                <span id="chat-nome-contato" style="font-weight:bold;"></span>
            </div>
            <ul id="messages"></ul>
            <div id="footer-container" style="display:none; padding:10px; background:#f0f0f0;">
                <form onsubmit="enviarMensagem(event)" style="display:flex; gap:8px;">
                    <input id="chat-input" placeholder="Mensagem..." style="flex:1; padding:12px; border-radius:25px; border:none;">
                    <button type="submit" style="background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">➤</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU", authDomain: "meu-zap-clone.firebaseapp.com", databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/", projectId: "meu-zap-clone" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        let meuUserAt = ""; let fotoTempBase64 = ""; let chatAtivoId = null;

        // PERSISTÊNCIA DE LOGIN
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('uids/' + user.uid).once('value', s => {
                    meuUserAt = s.val();
                    if (meuUserAt) {
                        entrarNoApp();
                        document.getElementById('loading-screen').style.display = 'none';
                    }
                });
            } else {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        function entrarNoApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            db.ref('usuarios/'+meuUserAt).on('value', s => {
                const d = s.val(); if(!d) return;
                document.getElementById('meu-nome-topo').innerText = d.nome;
                document.getElementById('minha-foto-topo').src = d.foto;
                document.getElementById('set-foto-preview').src = d.foto;
                document.getElementById('set-nome-input').value = d.nome;
                fotoTempBase64 = d.foto;
            });
            // Carrega fonte salva no navegador
            const savedFont = localStorage.getItem('zap_font') || "15";
            alterarFonte(savedFont);
            mudarTab('amigos');
        }

        function alterarFonte(v) {
            document.documentElement.style.setProperty('--chat-font-size', v + 'px');
            document.getElementById('font-val').innerText = v + 'px';
            document.getElementById('font-range').value = v;
            localStorage.setItem('zap_font', v);
        }

        // Funções de Perfil e Painéis
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }
        function toggleSearch() { document.getElementById('search-panel').classList.toggle('open'); }
        function uploadFoto(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { document.getElementById('set-foto-preview').src = e.target.result; fotoTempBase64 = e.target.result; }; reader.readAsDataURL(input.files[0]); } }
        function salvarPerfil() { db.ref('usuarios/'+meuUserAt).update({ nome: document.getElementById('set-nome-input').value.trim(), foto: fotoTempBase64 }).then(() => { alert("Perfil Salvo!"); toggleSettings(); }); }
        function fazerLogout() { if(confirm("Sair?")) auth.signOut().then(() => location.reload()); }

        // Restante das funções de Amigos, Busca e Chat...
        function mudarTab(t) {
            const list = document.getElementById('main-list'); list.innerHTML = "";
            if(t === 'amigos') {
                db.ref('amigos/'+meuUserAt).on('value', s => {
                    list.innerHTML = "";
                    s.forEach(c => {
                        db.ref('usuarios/'+c.key).once('value', uSnap => {
                            const u = uSnap.val(); if(!u) return;
                            const li = document.createElement('li'); li.className = "user-item";
                            li.innerHTML = `<img src="${u.foto}" class="avatar"><div><b>${u.nome}</b><br><small>${u.at}</small></div>`;
                            li.onclick = () => abrirChat(c.key, u.nome); list.appendChild(li);
                        });
                    });
                });
            } else {
                db.ref('convites/'+meuUserAt).on('value', s => {
                    list.innerHTML = "";
                    s.forEach(c => {
                        db.ref('usuarios/'+c.key).once('value', uSnap => {
                            const u = uSnap.val(); if(!u) return;
                            const li = document.createElement('li'); li.className="user-item";
                            li.innerHTML = `<img src="${u.foto}" class="avatar"><b>${u.nome}</b><button onclick="aceitarConvite('${c.key}')" style="margin-left:auto; background:#008069; color:white; border:none; padding:5px 10px; border-radius:5px;">Aceitar</button>`;
                            list.appendChild(li);
                        });
                    });
                });
            }
        }
        function abrirChat(id, nome) { chatAtivoId = id; document.getElementById('chat-nome-contato').innerText = nome; document.getElementById('footer-container').style.display = 'block'; document.body.classList.add('chat-aberto'); carregarMensagens(); }
        function carregarMensagens() {
            const path = [meuUserAt, chatAtivoId].sort().join('_');
            db.ref('chats/'+path).on('value', s => {
                const mList = document.getElementById('messages'); mList.innerHTML = "";
                s.forEach(c => {
                    const m = c.val(); const li = document.createElement('li'); li.className = "msg "+(m.sender===meuUserAt?'sent':'received');
                    li.innerHTML = `${m.texto}<span style="position:absolute; bottom:3px; right:8px; font-size:9px; opacity:0.5;">${m.dh || ""}</span>`;
                    mList.appendChild(li);
                });
                mList.scrollTop = mList.scrollHeight;
            });
        }
        function enviarMensagem(e) { e.preventDefault(); const input = document.getElementById('chat-input'); if(!input.value.trim()) return; const path = [meuUserAt, chatAtivoId].sort().join('_'); const agora = new Date(); const dh = agora.getHours().toString().padStart(2,'0')+':'+agora.getMinutes().toString().padStart(2,'0'); db.ref('chats/'+path).push({ texto: input.value, sender: meuUserAt, dh: dh }); input.value = ""; }
        function realizarLogin() { const e = document.getElementById('login-email').value; const p = document.getElementById('login-pass').value; auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message)); }
        function registrarUsuario() { const n = document.getElementById('reg-nome').value; const a = document.getElementById('reg-at').value.toLowerCase().replace(/\s/g, ''); const e = document.getElementById('reg-email').value; const p = document.getElementById('reg-pass').value; auth.createUserWithEmailAndPassword(e, p).then(res => { db.ref('usuarios/'+a).set({nome:n, at:'@'+a, email:e, uid:res.user.uid, foto:"https://cdn-icons-png.flaticon.com/512/149/149071.png"}); db.ref('uids/'+res.user.uid).set(a); }); }
        function alternarAuth(t) { document.getElementById('login-box').style.display = t==='login'?'block':'none'; document.getElementById('signup-box').style.display = t==='signup'?'block':'none'; }
        function buscarUsuarios(t) { const res = document.getElementById('search-results'); res.innerHTML = ""; if(t.length < 2) return; db.ref('usuarios').once('value', s => { s.forEach(child => { const u = child.val(); if(child.key === meuUserAt) return; if(u.at.includes(t) || u.nome.toLowerCase().includes(t.toLowerCase())) { const d = document.createElement('div'); d.className = "user-item"; d.innerHTML = `<img src="${u.foto}" class="avatar"><div><b>${u.nome}</b><br><small>${u.at}</small></div><button onclick="enviarConvite('${child.key}')" style="margin-left:auto; background:#008069; color:white; border:none; padding:5px 10px; border-radius:5px;">Add</button>`; res.appendChild(d); } }); }); }
        function enviarConvite(id) { db.ref(`convites/${id}/${meuUserAt}`).set({ from: meuUserAt }).then(() => alert("Enviado!")); }
        function aceitarConvite(id) { db.ref(`amigos/${meuUserAt}/${id}`).set({ id }); db.ref(`amigos/${id}/${meuUserAt}`).set({ id: meuUserAt }); db.ref(`convites/${meuUserAt}/${id}`).remove(); }
    </script>
</body>
</html>
