<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V23.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; }
        .login-box { background: #0b4e41; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        #login-screen input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 15px; font-size: 16px; width: 100%; }
        
        /* SIDEBAR */
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; }
        #sidebar-header { background: #ededed; padding: 15px; font-weight: bold; height: 60px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        #user-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; cursor: pointer; background: #fff; position: relative; }
        .avatar-container { position: relative; margin-right: 15px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #ccc; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 2px; right: 2px; }
        .online { background: #25d366; }
        .offline { background: #bbb; }
        .unread-badge { background: #007bff; color: white; min-width: 20px; height: 20px; border-radius: 50%; font-size: 11px; display: none; align-items: center; justify-content: center; margin-left: auto; font-weight: bold; padding: 0 5px; }

        /* CHAT AREA */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; z-index: 20; }
        #chat-header { background: #ededed; padding: 0 10px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; justify-content: space-between; }
        .header-info { display: flex; flex-direction: column; }
        .status-text { font-size: 11px; font-weight: normal; color: #666; }
        .back-btn { background: #075e54; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; margin-right: 8px; font-size: 18px; cursor: pointer; display: none; align-items: center; justify-content: center; }

        /* MENSAGENS */
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg-line { display: flex; flex-direction: column; margin-bottom: 8px; width: 100%; }
        .msg { padding: 6px 10px 18px 10px; border-radius: 8px; max-width: 85%; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; min-width: 60px; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        
        /* HORÁRIO DENTRO DO BALÃO */
        .msg-time { position: absolute; bottom: 3px; right: 7px; font-size: 10px; color: #888; }
        
        /* EMOJI GRANDE */
        .big-emoji { font-size: 45px; background: none !important; box-shadow: none !important; padding: 0 !important; }
        .big-emoji .msg-time { bottom: -15px; right: 0; }

        .msg img { max-width: 100%; border-radius: 8px; display: block; margin: 5px 0; }
        .msg a { color: #027eb5; text-decoration: underline; font-weight: bold; }

        /* RODAPÉ */
        #footer-container { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; position: relative; }
        #form { display: flex; align-items: center; gap: 8px; }
        input#input { flex-grow: 1; border: none; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; background: white; }
        .btn-circle { background: #075e54; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; }
            #chat-area { width: 100%; position: absolute; height: 100%; left: 100%; transition: 0.2s; }
            body.chat-aberto #chat-area { left: 0; }
            .back-btn { display: flex; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Zap Pro</h2>
            <img id="preview-img" style="width:100px; height:100px; border-radius:50%; object-fit:cover; display:none; margin:10px auto; border:3px solid #fff;">
            <input type="text" id="login-nome" placeholder="Seu nome">
            <label style="display:block; background:#25d366; padding:12px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-weight:bold; text-align:center;" for="login-foto">📸 Foto Perfil</label>
            <input type="file" id="login-foto" accept="image/*" style="display:none;" onchange="previewFoto(this)">
            <button onclick="fazerLogin()" style="width:100%; padding:15px; border-radius:8px; border:none; background:#25d366; color:white; font-weight:bold;">ENTRAR</button>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div id="sidebar-header">Conversas</div>
            <ul id="user-list" onclick="detectarToque(event)"></ul>
        </div>
        <div id="chat-area">
            <div id="chat-header">
                <div class="header-left" style="display: flex; align-items: center;">
                    <button class="back-btn" onclick="document.body.classList.remove('chat-aberto')">❮</button>
                    <div class="header-info">
                        <span id="nome-contato">Selecione um contato</span>
                        <span id="status-contato" class="status-text"></span>
                    </div>
                </div>
                <div class="header-btns" id="header-btns" style="display:none;">
                    <button class="btn-h" id="h-correct" style="background:#25d366; color:white; display:none; border:none; padding:8px 12px; border-radius:8px;" onclick="prepararCorrecao()">📝</button>
                    <button class="btn-h" id="h-del" style="background:#ff3b30; color:white; display:none; border:none; padding:8px 12px; border-radius:8px;" onclick="apagarSelecionadas()">🗑️</button>
                    <button class="btn-h" style="background:#075e54; color:white; border:none; padding:8px 12px; border-radius:8px;" id="h-pencil" onclick="ativarEdicao()">✏️</button>
                    <button class="btn-h" style="background:#888; color:white; display:none; border:none; padding:8px 12px; border-radius:8px;" id="h-cancel" onclick="desativarEdicao()">Sair</button>
                </div>
            </div>

            <ul id="messages"></ul>

            <div id="footer-container" style="display: none;">
                <div id="edit-banner" style="display:none; background:#dcf8c6; padding:5px 15px; font-size:12px; color:#075e54;">✏️ Corrigindo... <span onclick="cancelarEdicaoDirect()" style="float:right; cursor:pointer;">✖</span></div>
                <form id="form" onsubmit="processarEnvio(event)">
                    <label style="cursor:pointer; font-size:22px;">🖼️ <input type="file" accept="image/*" style="display:none" onchange="enviarArquivo(this, 'foto')"></label>
                    <label style="cursor:pointer; font-size:22px;">📷 <input type="file" accept="image/*" capture="environment" style="display:none" onchange="enviarArquivo(this, 'foto')"></label>
                    <input id="input" placeholder="Digite uma mensagem..." autocomplete="off">
                    <button type="submit" class="btn-circle">➤</button>
                    <button type="button" class="btn-circle" onclick="iniciarGravacao()">🎤</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone",
            storageBucket: "meu-zap-clone.firebasestorage.app",
            messagingSenderId: "972529173490",
            appId: "1:972529173490:web:b8444d778ebe5ed897216b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome, minhaFotoBase64, meuId, chatAtivo, idDestinoAtual, idEditando = null;

        // VERIFICA SE É SÓ EMOJI
        function apenasEmoji(str) {
            const emojiRegExp = /^(\u00a9|\u00ae|[\u2000-\u3300]|\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff])+$/g;
            return emojiRegExp.test(str.replace(/\s/g, ''));
        }

        function formatarLinks(texto) {
            const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/g;
            return texto ? texto.replace(urlRegex, (url) => `<a href="${url.startsWith('http')?url:'http://'+url}" target="_blank">${url}</a>`) : "";
        }

        if(localStorage.getItem('zap_id')) { fazerLogin(true); }

        function fazerLogin(automatico = false) {
            if(!automatico) {
                meuNome = document.getElementById('login-nome').value.trim();
                if(!meuNome) return;
                minhaFotoBase64 = minhaFotoBase64 || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                meuId = meuNome.toLowerCase().replace(/\s/g, '');
                localStorage.setItem('zap_nome', meuNome); localStorage.setItem('zap_foto', minhaFotoBase64); localStorage.setItem('zap_id', meuId);
            } else {
                meuNome = localStorage.getItem('zap_nome'); minhaFotoBase64 = localStorage.getItem('zap_foto'); meuId = localStorage.getItem('zap_id');
            }
            db.ref('usuarios/' + meuId).update({ nome: meuNome, foto: minhaFotoBase64 });
            db.ref('status/' + meuId).set('online');
            db.ref('status/' + meuId).onDisconnect().set('offline');
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            iniciarSistema();
        }

        function iniciarSistema() {
            db.ref('usuarios').on('value', snapshot => {
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';
                snapshot.forEach(child => {
                    if(child.key !== meuId) {
                        const user = child.val();
                        const li = document.createElement('li');
                        li.className = 'user-item';
                        li.dataset.id = child.key;
                        li.dataset.nome = user.nome;
                        li.innerHTML = `<div class="avatar-container"><img src="${user.foto}" class="avatar"><div id="dot-${child.key}" class="status-dot offline"></div></div><div style="display:flex; flex-direction:column; flex-grow:1;"><span style="font-weight:bold;">${user.nome}</span></div><div id="unread-${child.key}" class="unread-badge">0</div>`;
                        userList.appendChild(li);
                        db.ref('status/' + child.key).on('value', stSnap => {
                            const dot = document.getElementById('dot-' + child.key);
                            if(dot) dot.className = 'status-dot ' + (stSnap.val() === 'online' ? 'online' : 'offline');
                        });
                        const chatPath = [meuId, child.key].sort().join('_');
                        db.ref('chats/' + chatPath).on('value', chatSnap => {
                            let count = 0;
                            chatSnap.forEach(msgSnap => { if(msgSnap.val().sender !== meuId && (!msgSnap.val().lido_por || !msgSnap.val().lido_por[meuId])) count++; });
                            const badge = document.getElementById('unread-' + child.key);
                            if(badge) { badge.innerText = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
                        });
                    }
                });
            });
        }

        function abrirChat(idDestino, nomeDestino) {
            idDestinoAtual = idDestino;
            chatAtivo = [meuId, idDestino].sort().join('_');
            document.getElementById('nome-contato').innerText = nomeDestino;
            document.getElementById('footer-container').style.display = 'block';
            document.getElementById('header-btns').style.display = 'flex';
            document.body.classList.add('chat-aberto');
            marcarComoLidas();
            carregarMensagens();
        }

        function marcarComoLidas() {
            db.ref('chats/' + chatAtivo).once('value', snapshot => {
                snapshot.forEach(msgSnap => { if(msgSnap.val().sender !== meuId) db.ref('chats/' + chatAtivo + '/' + msgSnap.key + '/lido_por/' + meuId).set(true); });
            });
        }

        function carregarMensagens() {
            const mList = document.getElementById('messages');
            db.ref('chats/' + chatAtivo).off();
            db.ref('chats/' + chatAtivo).on('value', snapshot => {
                mList.innerHTML = '';
                snapshot.forEach(child => {
                    const msg = child.val(); const isSent = msg.sender === meuId;
                    const line = document.createElement('li'); line.className = 'msg-line';
                    const divMsg = document.createElement('div');
                    
                    let content = "";
                    let isBigEmoji = (msg.tipo === 'texto' && apenasEmoji(msg.texto));

                    divMsg.className = 'msg ' + (isSent ? 'sent' : 'received') + (isBigEmoji ? ' big-emoji' : '');

                    if(msg.excluida) content = `<span style="font-style:italic;color:#888;">🚫 Apagada</span>`;
                    else if(msg.tipo === 'foto') content = `<img src="${msg.arquivo}">`;
                    else if(msg.tipo === 'audio') content = `<audio controls src="${msg.audio}"></audio>`;
                    else content = formatarLinks(msg.texto);
                    
                    if(msg.editada && !msg.excluida) content += ` <small style="font-size:10px; color:#888;">(editada)</small>`;
                    
                    // Adiciona o horário
                    content += `<span class="msg-time">${msg.horario || ''}</span>`;

                    divMsg.innerHTML = content;
                    line.appendChild(divMsg);
                    mList.appendChild(line);
                });
                mList.scrollTop = mList.scrollHeight;
            });
        }

        function processarEnvio(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            const texto = input.value.trim();
            if(!texto) return;

            const agora = new Date();
            const horario = agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0');

            db.ref('chats/' + chatAtivo).push({ 
                texto: texto, 
                sender: meuId, 
                tipo: 'texto', 
                excluida: false,
                horario: horario,
                timestamp: Date.now()
            });
            input.value = '';
        }

        function enviarArquivo(input, tipo) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const agora = new Date();
                const horario = agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0');
                reader.onload = e => { db.ref('chats/' + chatAtivo).push({ arquivo: e.target.result, sender: meuId, tipo: tipo, excluida: false, horario: horario }); };
                reader.readAsDataURL(input.files[0]); input.value = "";
            }
        }

        function previewFoto(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = e => { document.getElementById('preview-img').src = e.target.result; document.getElementById('preview-img').style.display='block'; minhaFotoBase64=e.target.result; };
                r.readAsDataURL(i.files[0]);
            }
        }
        
        function detectarToque(e) { const it = e.target.closest('.user-item'); if(it) abrirChat(it.dataset.id, it.dataset.nome); }
        // Outras funções de edição/exclusão podem ser readicionadas conforme as versões anteriores
    </script>
</body>
</html>
