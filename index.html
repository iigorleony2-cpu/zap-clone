<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V29.4</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --chat-font-size: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* AUTH SCREENS */
        .auth-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; align-items: center; justify-content: center; z-index: 2000; color: white; padding: 20px; }
        .auth-box { background: #0b4e41; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-box input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 12px; font-size: 16px; color: #333; width: 100%; }
        .auth-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* APP LAYOUT */
        #app-container { display: none; width: 100%; height: 100%; }
        #sidebar { width: 30%; min-width: 300px; max-width: 450px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; position: relative; }
        
        /* PAINEL CONFIGS */
        #settings-panel { position: absolute; left: -100%; top: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 600; transition: 0.3s; display: flex; flex-direction: column; }
        #settings-panel.open { left: 0; }
        .upload-area { text-align: center; padding: 20px; background: white; margin-bottom: 10px; }
        .profile-img-big { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #25d366; cursor: pointer; }

        /* LISTAS E CHAT */
        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #ccc; }
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; max-width: none; }
            #chat-area { width: 100%; position: absolute; transform: translateX(100%); transition: 0.3s; }
            body.chat-aberto #chat-area { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- AUTH -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box" id="login-box">
            <h2>Zap Pro Login</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button onclick="realizarLogin()">ENTRAR</button>
            <p onclick="alternarAuth('signup')" style="cursor:pointer; font-size:13px; margin-top:15px;">Novo aqui? <b>Cadastre-se</b></p>
        </div>

        <div class="auth-box" id="signup-box" style="display:none;">
            <h2>Criar Conta</h2>
            <input type="text" id="reg-nome" placeholder="Seu Nome/Apelido">
            <input type="text" id="reg-at" placeholder="Crie seu @ (ex: igor.designer)">
            <input type="email" id="reg-email" placeholder="E-mail real">
            <input type="password" id="reg-pass" placeholder="Senha">
            <button onclick="registrarUsuario()">CADASTRAR</button>
            <p onclick="alternarAuth('login')" style="cursor:pointer; font-size:13px; margin-top:15px;">Já tem conta? <b>Login</b></p>
        </div>
    </div>

    <!-- APP -->
    <div id="app-container">
        <div id="sidebar">
            <div id="settings-panel">
                <div style="background:#008069; color:white; padding:15px; display:flex; align-items:center; gap:15px;">
                    <span style="cursor:pointer;" onclick="toggleSettings()">❮</span><span>Meu Perfil</span>
                </div>
                <div class="upload-area">
                    <img id="set-foto-preview" class="profile-img-big" src="" onclick="document.getElementById('set-foto-input').click()">
                    <p style="font-size:12px; color:#666; margin-top:10px;">Clique na foto para alterar</p>
                    <input type="file" id="set-foto-input" accept="image/*" style="display:none;" onchange="uploadFoto(this)">
                </div>
                <div style="padding:20px; flex-grow:1;">
                    <label style="font-size:12px; color:#008069; font-weight:bold;">APELIDO</label>
                    <input type="text" id="set-nome-input" style="width:100%; border:none; border-bottom:2px solid #008069; padding:10px 0; margin-bottom:20px; font-size:16px;">
                    <button onclick="salvarPerfil()" style="width:100%; padding:15px; background:#25d366; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SALVAR</button>
                    
                    <!-- BOTÃO LOGOUT -->
                    <button onclick="fazerLogout()" style="width:100%; margin-top:40px; padding:12px; background:none; border:1px solid #ff4d4d; color:#ff4d4d; border-radius:8px; font-weight:bold; cursor:pointer;">SAIR DA CONTA</button>
                </div>
            </div>

            <div style="background:#ededed; padding:10px 15px; display:flex; align-items:center; justify-content:space-between; height:60px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img id="minha-foto-small" src="" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                    <span id="meu-nome-topo" style="font-weight:bold;"></span>
                </div>
                <span style="cursor:pointer; font-size:20px;" onclick="toggleSettings()">⚙️</span>
            </div>
            <!-- Abas Amigos/Convites e Lista seguem lógica anterior... -->
            <ul id="main-list" style="list-style:none; padding:0; margin:0; overflow-y:auto; flex-grow:1;"></ul>
        </div>
        <div id="chat-area">
             <!-- Área de Mensagens... -->
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU", authDomain: "meu-zap-clone.firebaseapp.com", databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/", projectId: "meu-zap-clone" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        let meuUserAt = ""; let fotoTempBase64 = "";

        // AUTH FUNCTIONS
        function alternarAuth(t) { document.getElementById('login-box').style.display = t==='login'?'block':'none'; document.getElementById('signup-box').style.display = t==='signup'?'block':'none'; }

        function realizarLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            auth.signInWithEmailAndPassword(email, pass).then(res => {
                db.ref('uids/'+res.user.uid).once('value', s => { meuUserAt = s.val(); entrarNoApp(); });
            }).catch(() => alert("E-mail ou senha incorretos."));
        }

        function registrarUsuario() {
            const nome = document.getElementById('reg-nome').value.trim();
            const at = document.getElementById('reg-at').value.trim().toLowerCase().replace(/\s/g, '');
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            if(!nome || !at || !email || !pass) return alert("Preencha tudo!");

            db.ref('usuarios/'+at).once('value', s => {
                if(s.exists()) return alert("@ indisponível!");
                auth.createUserWithEmailAndPassword(email, pass).then(res => {
                    db.ref('usuarios/'+at).set({ nome, at: '@'+at, email, uid: res.user.uid, foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png" });
                    db.ref('uids/'+res.user.uid).set(at);
                    location.reload();
                }).catch(e => alert(e.message));
            });
        }

        function entrarNoApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            db.ref('usuarios/'+meuUserAt).on('value', s => {
                const d = s.val();
                document.getElementById('meu-nome-topo').innerText = d.nome;
                document.getElementById('minha-foto-small').src = d.foto;
                document.getElementById('set-foto-preview').src = d.foto;
                document.getElementById('set-nome-input').value = d.nome;
                fotoTempBase64 = d.foto;
            });
        }

        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }

        function uploadFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('set-foto-preview').src = e.target.result;
                    fotoTempBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function salvarPerfil() {
            const novoNome = document.getElementById('set-nome-input').value.trim();
            if(!novoNome) return;
            db.ref('usuarios/'+meuUserAt).update({ nome: novoNome, foto: fotoTempBase64 }).then(() => {
                alert("Perfil atualizado!");
                toggleSettings();
            });
        }

        function fazerLogout() {
            if(confirm("Deseja realmente sair da conta?")) {
                auth.signOut().then(() => {
                    location.reload(); // Recarrega para voltar à tela de login
                });
            }
        }
    </script>
</body>
</html>
