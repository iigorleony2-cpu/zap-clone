<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V29.2 - Oficial</title>
    <!-- Bibliotecas Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --chat-font-size: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* TELAS DE AUTENTICAÇÃO */
        .auth-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; align-items: center; justify-content: center; z-index: 2000; color: white; padding: 20px; overflow-y: auto; }
        .auth-box { background: #0b4e41; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-box input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 12px; font-size: 16px; color: #333; width: 100%; }
        .auth-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link-text { cursor: pointer; font-size: 13px; margin-top: 15px; display: block; color: #add8e6; }

        /* APP LAYOUT */
        #app-container { display: none; width: 100%; height: 100%; }
        #sidebar { width: 30%; min-width: 300px; max-width: 450px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; position: relative; }
        
        /* PAINÉIS LATERAIS */
        #settings-panel, #search-panel { position: absolute; left: -100%; top: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 600; transition: 0.3s ease; display: flex; flex-direction: column; }
        #settings-panel.open, #search-panel.open { left: 0; }
        .panel-header { background: #008069; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; font-size: 18px; }

        /* LISTAS E TABS */
        .tab-menu { display: flex; background: #ededed; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: bold; color: #666; }
        .tab-btn.active { border-bottom: 3px solid #008069; color: #008069; }
        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }

        /* ÁREA DE CHAT */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px 18px 10px; border-radius: 8px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; margin-bottom: 10px; font-size: var(--chat-font-size); min-width: 90px; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        .msg-time { position: absolute; bottom: 3px; right: 8px; font-size: 9px; color: rgba(0, 0, 0, 0.45); }

        @media (max-width: 768px) {
            #sidebar { width: 100%; max-width: none; position: absolute; }
            #chat-area { width: 100%; position: absolute; transform: translateX(100%); transition: 0.3s; }
            body.chat-aberto #chat-area { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- TELAS DE LOGIN/CADASTRO -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box" id="login-box">
            <h2>Zap Pro Login</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button onclick="realizarLogin()">ENTRAR</button>
            <span class="link-text" onclick="enviarRecuperacao()">Esqueci minha senha</span>
            <p onclick="alternarAuth('signup')" style="cursor:pointer; font-size:13px; margin-top:15px;">Novo aqui? <b>Cadastre-se</b></p>
        </div>

        <div class="auth-box" id="signup-box" style="display:none;">
            <h2>Criar Conta</h2>
            <input type="text" id="reg-nome" placeholder="Apelido (ex: Igor Designer)">
            <input type="text" id="reg-at" placeholder="Seu @ (ex: igor.leony)">
            <input type="email" id="reg-email" placeholder="E-mail real">
            <input type="password" id="reg-pass" placeholder="Senha">
            <button onclick="registrarUsuario()">CADASTRAR</button>
            <p onclick="alternarAuth('login')" style="cursor:pointer; font-size:13px; margin-top:15px;">Já tem conta? <b>Login</b></p>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <!-- PAINEL CONFIGS -->
            <div id="settings-panel">
                <div class="panel-header"><span style="cursor:pointer;" onclick="toggleSettings()">❮</span><span>Configurações</span></div>
                <div style="padding:20px;">
                    <label style="font-size:12px; color:#008069; font-weight:bold;">APELIDO</label>
                    <input type="text" id="set-nome-input" style="width:100%; border:none; border-bottom:2px solid #008069; padding:10px 0; margin-bottom:20px;">
                    <label style="font-size:12px; color:#008069; font-weight:bold;">FONTE: <span id="font-val">15px</span></label>
                    <input type="range" min="12" max="25" value="15" style="width:100%;" oninput="alterarFonte(this.value)">
                    <button onclick="salvarConfiguracoes()" style="width:100%; margin-top:20px; padding:15px; background:#25d366; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SALVAR</button>
                </div>
            </div>

            <!-- PAINEL BUSCA -->
            <div id="search-panel">
                <div class="panel-header"><span style="cursor:pointer;" onclick="toggleSearch()">❮</span><span>Buscar Pessoas</span></div>
                <div style="padding:10px;"><input type="text" id="search-input" placeholder="Pesquisar @ ou nome..." style="width:100%; padding:10px; border-radius:20px; border:1px solid #ddd;" oninput="buscarUsuarios(this.value)"></div>
                <div id="search-results"></div>
            </div>

            <!-- HEADER SIDEBAR -->
            <div id="sidebar-header">
                <div style="display:flex; align-items:center; gap:10px;"><img id="minha-foto" src="" style="width:35px; height:35px; border-radius:50%;"><span id="meu-nome-display" style="font-weight:bold;"></span></div>
                <div style="display:flex; gap:15px;"><span style="cursor:pointer;" onclick="toggleSearch()">🔍</span><span style="cursor:pointer;" onclick="toggleSettings()">⚙️</span></div>
            </div>

            <!-- TABS -->
            <div class="tab-menu">
                <button class="tab-btn active" id="tab-amigos" onclick="mudarTab('amigos')">AMIGOS</button>
                <button class="tab-btn" id="tab-convites" onclick="mudarTab('convites')">CONVITES <span id="count-convites" style="background:red; color:white; border-radius:50%; padding:2px 5px; display:none;">0</span></button>
            </div>
            <ul id="main-list" style="list-style:none; padding:0; margin:0; overflow-y:auto; flex-grow:1;"></ul>
        </div>

        <!-- CHAT -->
        <div id="chat-area">
            <div id="chat-header" style="background:#ededed; height:60px; padding:0 15px; display:flex; align-items:center; border-bottom:1px solid #ddd; justify-content:space-between;">
                <div style="display:flex; align-items:center;"><button style="background:none; border:none; font-size:20px; cursor:pointer; margin-right:10px; display:none;" class="back-btn" onclick="document.body.classList.remove('chat-aberto')">❮</button><span id="chat-nome-contato" style="font-weight:bold;"></span></div>
                <button id="btn-remover" style="display:none; color:red; background:none; border:none; cursor:pointer;" onclick="removerAmigo()">Remover Amigo</button>
            </div>
            <ul id="messages"></ul>
            <div id="footer-container" style="display:none; background:#f0f0f0; padding:10px; border-top:1px solid #ddd;">
                <form onsubmit="enviarMensagem(event)" style="display:flex; gap:8px;">
                    <input id="chat-input" placeholder="Mensagem..." style="flex:1; border:none; padding:12px; border-radius:25px;">
                    <button type="submit" style="background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">➤</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU", 
            authDomain: "meu-zap-clone.firebaseapp.com", 
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/", 
            projectId: "meu-zap-clone" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        let meuUserAt = ""; let tabAtual = 'amigos'; let chatAtivoId = null;

        // VALIDAÇÃO DO @ ÚNICO
        document.getElementById('reg-at').addEventListener('input', e => {
            let v = e.target.value.toLowerCase().replace(/\s/g, '').replace(/[^a-z0-9._]/g, '');
            e.target.value = v;
        });

        function alternarAuth(t) { 
            document.getElementById('login-box').style.display = t==='login'?'block':'none'; 
            document.getElementById('signup-box').style.display = t==='signup'?'block':'none'; 
        }

        function registrarUsuario() {
            const nome = document.getElementById('reg-nome').value.trim();
            const at = document.getElementById('reg-at').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            if(!nome || !at || !email || !pass) return alert("Preencha tudo!");
            
            db.ref('usuarios/'+at).once('value', s => {
                if(s.exists()) return alert("@ em uso!");
                auth.createUserWithEmailAndPassword(email, pass).then(res => {
                    db.ref('usuarios/'+at).set({ nome, at: '@'+at, email, uid: res.user.uid, foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png" });
                    db.ref('uids/'+res.user.uid).set(at);
                    location.reload();
                }).catch(e => alert(e.message));
            });
        }

        function realizarLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            auth.signInWithEmailAndPassword(email, pass).then(res => {
                db.ref('uids/'+res.user.uid).once('value', s => { meuUserAt = s.val(); entrarNoApp(); });
            }).catch(e => alert("E-mail ou senha incorretos."));
        }

        function enviarRecuperacao() {
            const email = document.getElementById('login-email').value.trim();
            if(!email) return alert("Digite o e-mail no campo acima.");
            auth.sendPasswordResetEmail(email).then(() => alert("E-mail de recuperação enviado!")).catch(e => alert(e.message));
        }

        function entrarNoApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            db.ref('usuarios/'+meuUserAt).on('value', s => {
                const d = s.val(); document.getElementById('meu-nome-display').innerText = d.nome;
                document.getElementById('minha-foto').src = d.foto; 
                document.getElementById('set-nome-input').value = d.nome;
            });
            mudarTab('amigos');
        }

        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }
        function toggleSearch() { document.getElementById('search-panel').classList.toggle('open'); }
        function alterarFonte(v) { document.documentElement.style.setProperty('--chat-font-size', v+'px'); document.getElementById('font-val').innerText = v+'px'; }
        function salvarConfiguracoes() { 
            db.ref('usuarios/'+meuUserAt).update({ nome: document.getElementById('set-nome-input').value.trim() })
              .then(() => { alert("Perfil Salvo!"); toggleSettings(); }); 
        }

        function buscarUsuarios(t) {
            const res = document.getElementById('search-results'); res.innerHTML = "";
            if(t.length < 2) return;
            db.ref('usuarios').once('value', s => {
                s.forEach(child => {
                    const u = child.val(); if(child.key === meuUserAt) return;
                    if(u.at.includes(t) || u.nome.toLowerCase().includes(t.toLowerCase())) {
                        const d = document.createElement('div'); d.className = "user-item";
                        d.innerHTML = `<img src="${u.foto}" class="avatar"><div><b>${u.nome}</b><br><small>${u.at}</small></div><button onclick="enviarConvite('${child.key}')" style="margin-left:auto; background:#008069; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Add</button>`;
                        res.appendChild(d);
                    }
                });
            });
        }

        function enviarConvite(id) { db.ref(`convites/${id}/${meuUserAt}`).set({ from: meuUserAt }).then(() => alert("Convite enviado!")); }

        function aceitarConvite(id) {
            db.ref('usuarios/'+id).once('value', s => {
                db.ref(`amigos/${meuUserAt}/${id}`).set({ id });
                db.ref(`amigos/${id}/${meuUserAt}`).set({ id: meuUserAt });
                db.ref(`convites/${meuUserAt}/${id}`).remove();
            });
        }

        function removerAmigo() { 
            if(confirm("Remover amizade?")) { 
                db.ref(`amigos/${meuUserAt}/${chatAtivoId}`).remove(); 
                db.ref(`amigos/${chatAtivoId}/${meuUserAt}`).remove(); 
                location.reload(); 
            } 
        }

        function mudarTab(t) {
            tabAtual = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            const list = document.getElementById('main-list'); list.innerHTML = "";
            
            if(t === 'amigos') {
                db.ref('amigos/'+meuUserAt).on('value', s => {
                    list.innerHTML = "";
                    s.forEach(c => {
                        db.ref('usuarios/'+c.key).once('value', uSnap => {
                            const u = uSnap.val(); const li = document.createElement('li'); li.className = "user-item";
                            li.innerHTML = `<img src="${u.foto}" class="avatar"><div><b>${u.nome}</b><br><small>${u.at}</small></div>`;
                            li.onclick = () => abrirChat(c.key, u.nome); list.appendChild(li);
                        });
                    });
                });
            } else {
                db.ref('convites/'+meuUserAt).on('value', s => {
                    list.innerHTML = ""; const count = s.numChildren(); 
                    document.getElementById('count-convites').innerText = count; 
                    document.getElementById('count-convites').style.display = count>0?'inline':'none';
                    s.forEach(c => {
                        db.ref('usuarios/'+c.key).once('value', uSnap => {
                            const u = uSnap.val(); const li = document.createElement('li'); li.className = "user-item";
                            li.innerHTML = `<img src="${u.foto}" class="avatar"><div><b>${u.nome}</b></div><button onclick="aceitarConvite('${c.key}')" style="margin-left:auto; background:#008069; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Aceitar</button>`;
                            list.appendChild(li);
                        });
                    });
                });
            }
        }

        function abrirChat(id, nome) {
            chatAtivoId = id; document.getElementById('chat-nome-contato').innerText = nome;
            document.getElementById('footer-container').style.display = 'block'; 
            document.getElementById('btn-remover').style.display = 'block';
            document.body.classList.add('chat-aberto'); carregarMensagens();
        }

        function carregarMensagens() {
            const path = [meuUserAt, chatAtivoId].sort().join('_');
            db.ref('chats/'+path).on('value', s => {
                const mList = document.getElementById('messages'); mList.innerHTML = "";
                s.forEach(c => {
                    const m = c.val(); const li = document.createElement('li'); 
                    li.className = "msg "+(m.sender===meuUserAt?'sent':'received');
                    li.innerHTML = `${m.texto}<span class="msg-time">${m.dh}</span>`; mList.appendChild(li);
                });
                mList.scrollTop = mList.scrollHeight;
            });
        }

        function enviarMensagem(e) {
            e.preventDefault(); const input = document.getElementById('chat-input'); if(!input.value.trim()) return;
            const path = [meuUserAt, chatAtivoId].sort().join('_');
            const agora = new Date(); const dh = agora.getHours().toString().padStart(2,'0')+':'+agora.getMinutes().toString().padStart(2,'0');
            db.ref('chats/'+path).push({ texto: input.value, sender: meuUserAt, dh: dh });
            input.value = "";
        }
    </script>
</body>
</html>
