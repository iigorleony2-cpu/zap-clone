<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Zap Clone</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px; margin-bottom: 5px; border-radius: 8px; max-width: 70%; word-wrap: break-word; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        #form { display: flex; padding: 10px; background: #f0f0f0; align-items: center; }
        input { flex-grow: 1; border: none; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; margin-left: 8px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" placeholder="Digite uma mensagem..." autocomplete="off">
        <button type="submit">Enviar</button>
    </form>

    <script>
        // Suas chaves que você me enviou
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone",
            storageBucket: "meu-zap-clone.firebasestorage.app",
            messagingSenderId: "972529173490",
            appId: "1:972529173490:web:b8444d778ebe5ed897216b"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substring(7); // Identificador pra saber que a msg é sua

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messagesList = document.getElementById('messages');

        // Enviar mensagem
        form.addEventListener('submit', e => {
            e.preventDefault();
            if (input.value.trim()) {
                db.ref('mensagens').push({
                    texto: input.value,
                    sender: myId,
                    hora: Date.now()
                });
                input.value = '';
            }
        });

        // Mostrar mensagens na tela
        db.ref('mensagens').limitToLast(50).on('child_added', snapshot => {
            const msg = snapshot.val();
            const li = document.createElement('li');
            li.textContent = msg.texto;
            li.className = 'msg ' + (msg.sender === myId ? 'sent' : 'received');
            messagesList.appendChild(li);
            messagesList.scrollTop = messagesList.scrollHeight; // Auto-scroll
        });
    </script>
</body>
</html>
