<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V5 - Final</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* TELA DE LOGIN */
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; }
        .login-box { background: #0b4e41; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #login-screen input[type="text"] { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 15px; outline: none; font-size: 16px; }
        .upload-label { display: block; background: #25d366; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        #login-foto { display: none; }
        #preview-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; display: none; border: 3px solid #fff; }

        /* CONTAINER DO APP */
        #app-container { display: none; width: 100%; height: 100%; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; }
        #sidebar-header { background: #ededed; padding: 10px 15px; font-weight: bold; height: 60px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        #user-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #ccc; }

        /* CHAT AREA */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }
        #chat-header { background: #ededed; padding: 10px 15px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; }
        .back-btn { display: none; background: #075e54; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; cursor: pointer; font-size: 18px; }
        
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px; margin-bottom: 5px; border-radius: 8px; max-width: 85%; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        audio { max-width: 100%; height: 40px; margin-top: 5px; }

        /* FOOTER COM TEXTO E ÁUDIO */
        #form { display: flex; padding: 10px; background: #f0f0f0; align-items: center; border-top: 1px solid #ddd; }
        input#input { flex-grow: 1; border: none; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        .btn-icon { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; margin-left: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .btn-mic.recording { background: #ff3b30; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* RESPONSIVIDADE MOBILE */
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; transition: 0.3s; }
            #chat-area { width: 100%; position: absolute; height: 100%; left: 100%; transition: 0.3s; }
            body.chat-aberto #sidebar { left: -100%; }
            body.chat-aberto #chat-area { left: 0; }
            .back-btn { display: flex; align-items: center; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Zap Pro</h2>
            <img id="preview-img" src="">
            <input type="text" id="login-nome" placeholder="Seu nome">
            <label class="upload-label" for="login-foto">📸 Escolher Foto de Perfil</label>
            <input type="file" id="login-foto" accept="image/*" onchange="previewFoto(this)">
            <button onclick="fazerLogin()" style="width: 100%; padding: 15px; border-radius: 8px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer;">ENTRAR</button>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app-container">
        <div id="sidebar">
            <div id="sidebar-header">Conversas</div>
            <ul id="user-list"></ul>
        </div>
        <div id="chat-area">
            <div id="chat-header">
                <button class="back-btn" onclick="document.body.classList.remove('chat-aberto')">❮</button>
                <span id="nome-contato">Selecione um contato</span>
            </div>
            <ul id="messages"></ul>
            <form id="form" style="display: none;">
                <input id="input" placeholder="Digite uma mensagem..." autocomplete="off">
                <button type="submit" id="btn-enviar" class="btn-icon">➤</button>
                <button type="button" id="btn-mic" class="btn-icon">🎤</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone",
            storageBucket: "meu-zap-clone.firebasestorage.app",
            messagingSenderId: "972529173490",
            appId: "1:972529173490:web:b8444d778ebe5ed897216b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome, minhaFotoBase64, meuId, chatAtivo, mediaRecorder, audioChunks = [];

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById('preview-img');
                    img.src = e.target.result;
                    img.style.display = 'inline-block';
                    minhaFotoBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        if(localStorage.getItem('zap_id')) { fazerLogin(true); }

        function fazerLogin(automatico = false) {
            if(!automatico) {
                meuNome = document.getElementById('login-nome').value.trim();
                if(!meuNome) return alert("Digite seu nome!");
                minhaFotoBase64 = minhaFotoBase64 || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                meuId = meuNome.toLowerCase().replace(/\s/g, '');
                localStorage.setItem('zap_nome', meuNome);
                localStorage.setItem('zap_foto', minhaFotoBase64);
                localStorage.setItem('zap_id', meuId);
            } else {
                meuNome = localStorage.getItem('zap_nome');
                minhaFotoBase64 = localStorage.getItem('zap_foto');
                meuId = localStorage.getItem('zap_id');
            }
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            iniciarSistema();
        }

        function iniciarSistema() {
            const statusRef = db.ref('status/' + meuId);
            statusRef.set({ nome: meuNome, foto: minhaFotoBase64, online: true });
            statusRef.onDisconnect().remove();

            db.ref('status').on('value', snapshot => {
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';
                snapshot.forEach(child => {
                    if(child.key !== meuId) {
                        const user = child.val();
                        const li = document.createElement('li');
                        li.className = 'user-item';
                        li.innerHTML = `<img src="${user.foto}" class="avatar"> <span>${user.nome}</span>`;
                        li.onclick = () => abrirChat(child.key, user.nome);
                        userList.appendChild(li);
                    }
                });
            });
        }

        function abrirChat(idDestino, nomeDestino) {
            chatAtivo = [meuId, idDestino].sort().join('_');
            document.getElementById('nome-contato').innerText = nomeDestino;
            document.getElementById('form').style.display = 'flex';
            document.body.classList.add('chat-aberto');
            carregarMensagens();
        }

        function carregarMensagens() {
            const mList = document.getElementById('messages');
            mList.innerHTML = '';
            db.ref('chats/' + chatAtivo).off();
            db.ref('chats/' + chatAtivo).on('child_added', s => {
                const msg = s.val();
                const li = document.createElement('li');
                li.className = 'msg ' + (msg.sender === meuId ? 'sent' : 'received');
                
                if(msg.tipo === 'audio') {
                    li.innerHTML = `<audio controls src="${msg.audio}"></audio>`;
                } else {
                    li.textContent = msg.texto;
                }
                
                mList.appendChild(li);
                mList.scrollTop = mList.scrollHeight;
            });
        }

        document.getElementById('form').addEventListener('submit', e => {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value.trim() && chatAtivo) {
                db.ref('chats/' + chatAtivo).push({ texto: input.value, sender: meuId, tipo: 'texto' });
                input.value = '';
            }
        });

        // LÓGICA DE ÁUDIO
        const btnMic = document.getElementById('btn-mic');
        
        btnMic.addEventListener('mousedown', iniciarGravacao);
        btnMic.addEventListener('touchstart', iniciarGravacao, {passive: false});

        window.addEventListener('mouseup', pararGravacao);
        window.addEventListener('touchend', pararGravacao);

        async function iniciarGravacao(e) {
            e.preventDefault();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        db.ref('chats/' + chatAtivo).push({ audio: reader.result, sender: meuId, tipo: 'audio' });
                    };
                    reader.readAsDataURL(audioBlob);
                };
                mediaRecorder.start();
                btnMic.classList.add('recording');
            } catch (err) {
                alert("Erro ao acessar microfone. Verifique as permissões.");
            }
        }

        function pararGravacao() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btnMic.classList.remove('recording');
            }
        }
    </script>
</body>
</html>
