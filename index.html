<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V29.0 - Segurança Google</title>
    <!-- Bibliotecas Firebase (Auth + Database) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --chat-font-size: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        .auth-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; align-items: center; justify-content: center; z-index: 2000; color: white; padding: 20px; }
        .auth-box { background: #0b4e41; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-box input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 12px; font-size: 16px; color: #333; }
        .auth-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link-text { cursor: pointer; font-size: 13px; margin-top: 15px; display: block; color: #add8e6; }

        #app-container { display: none; width: 100%; height: 100%; }
        /* Estilos de Sidebar e Chat seguem o padrão das versões anteriores */
    </style>
</head>
<body>

    <!-- TELAS DE AUTENTICAÇÃO -->
    <div id="auth-screen" class="auth-screen">
        <!-- LOGIN -->
        <div class="auth-box" id="login-box">
            <h2>Zap Pro Login</h2>
            <input type="email" id="login-email" placeholder="Seu e-mail">
            <input type="password" id="login-pass" placeholder="Sua senha">
            <button onclick="fazerLogin()">ENTRAR</button>
            <span class="link-text" onclick="enviarRecuperacao()">Esqueci minha senha</span>
            <span class="link-text" onclick="alternarAuth('signup')">Não tem conta? <b>Cadastre-se</b></span>
        </div>

        <!-- CADASTRO -->
        <div class="auth-box" id="signup-box" style="display:none;">
            <h2>Criar Conta</h2>
            <input type="text" id="reg-nome" placeholder="Nome de Exibição (Ex: Igor Designer)">
            <input type="text" id="reg-at" placeholder="Crie seu @ (Ex: @igor)">
            <input type="email" id="reg-email" placeholder="Seu e-mail real">
            <input type="password" id="reg-pass" placeholder="Crie uma senha">
            <button onclick="registrarUsuario()">CADASTRAR</button>
            <span class="link-text" onclick="alternarAuth('login')">Já tem conta? <b>Faça Login</b></span>
        </div>
    </div>

    <div id="app-container">
        <!-- Estrutura do App (Sidebar, Busca, Chat) -->
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function alternarAuth(tela) {
            document.getElementById('login-box').style.display = tela === 'login' ? 'block' : 'none';
            document.getElementById('signup-box').style.display = tela === 'signup' ? 'block' : 'none';
        }

        // CADASTRO COM EMAIL E @ ÚNICO
        function registrarUsuario() {
            const nome = document.getElementById('reg-nome').value.trim();
            const at = document.getElementById('reg-at').value.trim().toLowerCase().replace('@','');
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();

            if(!nome || !at || !email || !pass) return alert("Preencha tudo!");

            // 1. Verifica se o @ já existe no Database
            db.ref('usuarios/' + at).once('value', snapshot => {
                if(snapshot.exists()) return alert("Este @ já está em uso por outra pessoa.");

                // 2. Cria o usuário no Firebase Auth (Segurança)
                auth.createUserWithEmailAndPassword(email, pass)
                    .then((userCredential) => {
                        // 3. Salva os dados extras no Realtime Database
                        db.ref('usuarios/' + at).set({
                            nome: nome,
                            at: '@' + at,
                            email: email,
                            uid: userCredential.user.uid,
                            foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png"
                        });
                        // 4. Salva a relação UID -> @ para facilitar o login futuro
                        db.ref('uids/' + userCredential.user.uid).set(at);
                        
                        alert("Conta criada com sucesso!");
                        location.reload();
                    })
                    .catch(error => alert("Erro: " + error.message));
            });
        }

        // LOGIN COM EMAIL
        function fazerLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            auth.signInWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    // Busca o @ do usuário pelo UID
                    db.ref('uids/' + userCredential.user.uid).once('value', s => {
                        const userAt = s.val();
                        db.ref('usuarios/' + userAt).once('value', userSnap => {
                            window.meuUsuario = { ...userSnap.val(), id: userAt };
                            entrarNoApp();
                        });
                    });
                })
                .catch(error => alert("E-mail ou senha incorretos."));
        }

        // RECUPERAÇÃO DE SENHA (O Google envia o e-mail)
        function enviarRecuperacao() {
            const email = document.getElementById('login-email').value.trim();
            if(!email) return alert("Digite seu e-mail no campo acima para receber o link de recuperação.");

            auth.sendPasswordResetEmail(email)
                .then(() => alert("E-mail de recuperação enviado! Verifique sua caixa de entrada."))
                .catch(error => alert("Erro: " + error.message));
        }

        function entrarNoApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            // Aqui você chama as funções de carregar amigos e chats que já tínhamos
        }
    </script>
</body>
</html>
