<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V11.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; }
        .login-box { background: #0b4e41; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        #login-screen input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 15px; font-size: 16px; }
        
        /* APP */
        #app-container { display: none; width: 100%; height: 100%; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; }
        #sidebar-header { background: #ededed; padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd; height: 60px; display: flex; align-items: center; }
        #user-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; cursor: pointer; background: #fff; width: 100%; position: relative; }
        .user-item * { pointer-events: none; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #ccc; }

        /* CHAT AREA */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; z-index: 20; }
        #chat-header { background: #ededed; padding: 0 15px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; justify-content: space-between; }
        .header-left { display: flex; align-items: center; flex-grow: 1; }
        .back-btn { background: #075e54; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; font-size: 18px; cursor: pointer; display: none; align-items: center; justify-content: center; }
        
        /* HEADER ACTIONS */
        .header-btns { display: flex; align-items: center; gap: 10px; }
        .btn-action-header { background: #075e54; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .btn-cancel-edit { background: #888; }
        .btn-delete-confirm { background: #ff3b30; display: none; }

        /* MESSAGES */
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg-line { display: flex; align-items: center; margin-bottom: 8px; width: 100%; position: relative; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: #dcf8c6; margin-left: auto; }
        .received { background: #fff; margin-right: auto; }
        
        /* SELEÇÃO RESTRITA */
        .select-dot { width: 22px; height: 22px; margin-right: 10px; display: none; accent-color: #075e54; flex-shrink: 0; }
        body.edit-mode .sent-line .select-dot { display: block; } /* Só mostra nas enviadas */
        body.edit-mode .received-line .select-dot { display: none !important; } /* Esconde nas recebidas */

        /* FOOTER */
        #footer-container { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; position: relative; }
        #form { display: flex; align-items: center; }
        input#input { flex-grow: 1; border: none; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        .btn-circle { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; margin-left: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* GRAVAÇÃO */
        #recording-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f0f0; display: none; align-items: center; padding: 0 15px; z-index: 50; }
        .timer-text { color: #ff3b30; font-weight: bold; flex-grow: 1; margin-left: 10px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; }
            #chat-area { width: 100%; position: absolute; height: 100%; left: 100%; transition: 0.2s; }
            body.chat-aberto #chat-area { left: 0; }
            .back-btn { display: flex; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Zap Pro</h2>
            <img id="preview-img" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; display:none; margin:10px auto; border:3px solid #fff;">
            <input type="text" id="login-nome" placeholder="Seu nome">
            <label style="display:block; background:#25d366; padding:12px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-weight:bold; text-align:center;" for="login-foto">📸 Escolher Foto</label>
            <input type="file" id="login-foto" accept="image/*" style="display:none;" onchange="previewFoto(this)">
            <button onclick="fazerLogin()" style="width:100%; padding:15px; border-radius:8px; border:none; background:#25d366; color:white; font-weight:bold; cursor:pointer;">ENTRAR</button>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div id="sidebar-header">Conversas</div>
            <ul id="user-list" onclick="detectarToque(event)"></ul>
        </div>
        <div id="chat-area">
            <div id="chat-header">
                <div class="header-left">
                    <button class="back-btn" onclick="document.body.classList.remove('chat-aberto')">❮</button>
                    <span id="nome-contato">Selecione um contato</span>
                </div>
                <div class="header-btns" id="header-btns" style="display:none;">
                    <button class="btn-action-header" id="btn-edit-toggle" onclick="toggleEditMode()">✏️</button>
                    <button class="btn-action-header btn-delete-confirm" id="btn-del-now" onclick="apagarSelecionadas()">Apagar</button>
                </div>
            </div>
            <ul id="messages"></ul>
            <div id="footer-container" style="display: none;">
                <form id="form" onsubmit="enviarTexto(event)">
                    <input id="input" placeholder="Digite uma mensagem..." autocomplete="off">
                    <button type="submit" class="btn-circle">➤</button>
                    <button type="button" class="btn-circle" onclick="iniciarGravacao()">🎤</button>
                </form>
                <div id="recording-ui">
                    <button style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="cancelarGravacao()">🗑️</button>
                    <div style="width:10px; height:10px; background:red; border-radius:50%; margin:0 10px;"></div>
                    <div id="timer-display" class="timer-text">0:00</div>
                    <button class="btn-circle" style="background:#00a884" onclick="pararESEnviar()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone",
            storageBucket: "meu-zap-clone.firebasestorage.app",
            messagingSenderId: "972529173490",
            appId: "1:972529173490:web:b8444d778ebe5ed897216b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome, minhaFotoBase64, meuId, chatAtivo, mediaRecorder, audioChunks = [], timerInterval, segundos = 0, gravacaoCancelada = false;

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById('preview-img');
                    img.src = e.target.result; img.style.display = 'block';
                    minhaFotoBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        if(localStorage.getItem('zap_id')) { fazerLogin(true); }

        function fazerLogin(automatico = false) {
            if(!automatico) {
                meuNome = document.getElementById('login-nome').value.trim();
                if(!meuNome) return alert("Digite seu nome!");
                minhaFotoBase64 = minhaFotoBase64 || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                meuId = meuNome.toLowerCase().replace(/\s/g, '');
                localStorage.setItem('zap_nome', meuNome);
                localStorage.setItem('zap_foto', minhaFotoBase64);
                localStorage.setItem('zap_id', meuId);
            } else {
                meuNome = localStorage.getItem('zap_nome');
                minhaFotoBase64 = localStorage.getItem('zap_foto');
                meuId = localStorage.getItem('zap_id');
            }
            db.ref('usuarios/' + meuId).set({ nome: meuNome, foto: minhaFotoBase64 });
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            iniciarSistema();
        }

        function iniciarSistema() {
            db.ref('online/' + meuId).set(true);
            db.ref('online/' + meuId).onDisconnect().remove();
            db.ref('usuarios').on('value', snapshot => {
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';
                snapshot.forEach(child => {
                    if(child.key !== meuId) {
                        const user = child.val();
                        const li = document.createElement('li');
                        li.className = 'user-item';
                        li.setAttribute('data-id', child.key);
                        li.setAttribute('data-nome', user.nome);
                        li.innerHTML = `<img src="${user.foto}" class="avatar"><span>${user.nome}</span>`;
                        userList.appendChild(li);
                    }
                });
            });
        }

        function detectarToque(event) {
            const item = event.target.closest('.user-item');
            if (item) abrirChat(item.getAttribute('data-id'), item.getAttribute('data-nome'));
        }

        function abrirChat(idDestino, nomeDestino) {
            chatAtivo = [meuId, idDestino].sort().join('_');
            document.getElementById('nome-contato').innerText = nomeDestino;
            document.getElementById('footer-container').style.display = 'block';
            document.getElementById('header-btns').style.display = 'flex';
            document.body.classList.add('chat-aberto');
            desativarEdicao();
            carregarMensagens();
        }

        function carregarMensagens() {
            const mList = document.getElementById('messages');
            db.ref('chats/' + chatAtivo).off();
            db.ref('chats/' + chatAtivo).on('value', snapshot => {
                mList.innerHTML = '';
                snapshot.forEach(child => {
                    const msg = child.val();
                    const isSent = msg.sender === meuId;
                    const line = document.createElement('li');
                    
                    // Classe específica para permitir seleção apenas nas enviadas
                    line.className = 'msg-line ' + (isSent ? 'sent-line' : 'received-line');
                    
                    const content = msg.excluida ? `<span style="font-style:italic;color:#888;">🚫 Apagada</span>` : 
                                   (msg.tipo === 'audio' ? `<audio controls src="${msg.audio}"></audio>` : msg.texto);

                    line.innerHTML = `
                        <input type="checkbox" class="select-dot" data-msgid="${child.key}">
                        <div class="msg ${isSent ? 'sent' : 'received'}">${content}</div>
                    `;
                    mList.appendChild(line);
                });
                mList.scrollTop = mList.scrollHeight;
            });
        }

        function toggleEditMode() {
            const isEditing = document.body.classList.toggle('edit-mode');
            document.getElementById('btn-del-now').style.display = isEditing ? 'block' : 'none';
            document.getElementById('btn-edit-toggle').innerText = isEditing ? '✖️' : '✏️';
            document.getElementById('btn-edit-toggle').className = isEditing ? 'btn-action-header btn-cancel-edit' : 'btn-action-header';
        }

        function desativarEdicao() {
            document.body.classList.remove('edit-mode');
            document.getElementById('btn-del-now').style.display = 'none';
            document.getElementById('btn-edit-toggle').innerText = '✏️';
            document.getElementById('btn-edit-toggle').className = 'btn-action-header';
        }

        function apagarSelecionadas() {
            const boxes = document.querySelectorAll('.select-dot:checked');
            if (boxes.length === 0) return alert("Selecione mensagens.");
            if (confirm(`Deseja apagar ${boxes.length} mensagens para todos?`)) {
                boxes.forEach(box => {
                    const mid = box.getAttribute('data-msgid');
                    db.ref('chats/' + chatAtivo + '/' + mid).update({ excluida: true, texto: null, audio: null });
                });
                toggleEditMode();
            }
        }

        function enviarTexto(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value.trim() && chatAtivo) {
                db.ref('chats/' + chatAtivo).push({ texto: input.value, sender: meuId, tipo: 'texto', excluida: false });
                input.value = '';
            }
        }

        async function iniciarGravacao() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                gravacaoCancelada = false;
                mediaRecorder.ondataavailable = e => { if (!gravacaoCancelada) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    if(!gravacaoCancelada && audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => db.ref('chats/' + chatAtivo).push({ audio: reader.result, sender: meuId, tipo: 'audio', excluida: false });
                        reader.readAsDataURL(blob);
                    }
                };
                mediaRecorder.start();
                document.getElementById('recording-ui').style.display = 'flex';
                segundos = 0;
                timerInterval = setInterval(() => {
                    segundos++;
                    const min = Math.floor(segundos/60); const seg = segundos%60;
                    document.getElementById('timer-display').innerText = `${min}:${seg < 10 ? '0' : ''}${seg}`;
                }, 1000);
            } catch (err) { alert("Ative o microfone."); }
        }

        function cancelarGravacao() {
            if (mediaRecorder) {
                gravacaoCancelada = true; 
                audioChunks = [];
                mediaRecorder.stop();
                fecharUI();
            }
        }

        function pararESEnviar() {
            if (mediaRecorder) { gravacaoCancelada = false; mediaRecorder.stop(); fecharUI(); }
        }

        function fecharUI() { clearInterval(timerInterval); document.getElementById('recording-ui').style.display = 'none'; }
    </script>
</body>
</html>
