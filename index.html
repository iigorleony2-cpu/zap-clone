<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V4 - Com Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Tela de Login */
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        #login-screen input { padding: 12px; border-radius: 8px; border: none; width: 80%; max-width: 300px; margin-bottom: 10px; }
        #login-screen button { padding: 12px 30px; border-radius: 8px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; }

        /* Estrutura do App (Escondida antes do login) */
        #app-container { display: none; width: 100%; height: 100%; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #sidebar-header { background: #075e54; color: white; padding: 15px; font-weight: bold; }
        .user-item { padding: 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #ccc; }

        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }
        #chat-header { background: #ededed; padding: 10px 15px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; }
        .back-btn { display: none; background: #075e54; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; }
        
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px; margin-bottom: 5px; border-radius: 8px; max-width: 85%; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        
        #form { display: flex; padding: 10px; background: #f0f0f0; }
        input { flex-grow: 1; border: none; padding: 12px; border-radius: 25px; outline: none; }
        #form button { background: #075e54; color: white; border: none; padding: 0 20px; margin-left: 8px; border-radius: 25px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; }
            #chat-area { width: 100%; position: absolute; height: 100%; left: 100%; transition: 0.3s; }
            body.chat-aberto #chat-area { left: 0; }
            .back-btn { display: flex; align-items: center; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Zap Clone Login</h2>
        <input type="text" id="login-nome" placeholder="Seu nome ou apelido">
        <input type="text" id="login-foto" placeholder="Link da foto (opcional)">
        <button onclick="fazerLogin()">Entrar no Chat</button>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div id="sidebar-header">Conversas</div>
            <ul id="user-list"></ul>
        </div>
        <div id="chat-area">
            <div id="chat-header">
                <button class="back-btn" onclick="document.body.classList.remove('chat-aberto')">❮</button>
                <span id="nome-contato">Selecione um contato</span>
            </div>
            <ul id="messages"></ul>
            <form id="form" style="display: none;">
                <input id="input" placeholder="Digite uma mensagem..." autocomplete="off">
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone",
            storageBucket: "meu-zap-clone.firebasestorage.app",
            messagingSenderId: "972529173490",
            appId: "1:972529173490:web:b8444d778ebe5ed897216b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome, minhaFoto, meuId, chatAtivo;

        // Verifica se já logou antes (Memória do Navegador)
        if(localStorage.getItem('zap_id')) {
            fazerLogin(true);
        }

        function fazerLogin(automatico = false) {
            if(!automatico) {
                meuNome = document.getElementById('login-nome').value;
                minhaFoto = document.getElementById('login-foto').value || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                meuId = meuNome.toLowerCase().replace(/\s/g, ''); // Cria um ID fixo baseado no nome
                
                localStorage.setItem('zap_nome', meuNome);
                localStorage.setItem('zap_foto', minhaFoto);
                localStorage.setItem('zap_id', meuId);
            } else {
                meuNome = localStorage.getItem('zap_nome');
                minhaFoto = localStorage.getItem('zap_foto');
                meuId = localStorage.getItem('zap_id');
            }

            if(!meuId) return alert("Digite um nome!");

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';

            iniciarSistema();
        }

        function iniciarSistema() {
            const statusRef = db.ref('status/' + meuId);
            statusRef.set({ nome: meuNome, foto: minhaFoto, online: true });
            statusRef.onDisconnect().remove();

            // Lista de Contatos
            db.ref('status').on('value', snapshot => {
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';
                snapshot.forEach(child => {
                    if(child.key !== meuId) {
                        const user = child.val();
                        const li = document.createElement('li');
                        li.className = 'user-item';
                        li.innerHTML = `<img src="${user.foto}" class="avatar"> <span>${user.nome}</span>`;
                        li.onclick = () => abrirChat(child.key, user.nome);
                        userList.appendChild(li);
                    }
                });
            });
        }

        function abrirChat(idDestino, nomeDestino) {
            chatAtivo = [meuId, idDestino].sort().join('_');
            document.getElementById('nome-contato').innerText = nomeDestino;
            document.getElementById('form').style.display = 'flex';
            document.body.classList.add('chat-aberto');
            carregarMensagens();
        }

        function carregarMensagens() {
            const mList = document.getElementById('messages');
            mList.innerHTML = '';
            db.ref('chats/' + chatAtivo).off();
            db.ref('chats/' + chatAtivo).on('child_added', s => {
                const msg = s.val();
                const li = document.createElement('li');
                li.className = 'msg ' + (msg.sender === meuId ? 'sent' : 'received');
                li.textContent = msg.texto;
                mList.appendChild(li);
                mList.scrollTop = mList.scrollHeight;
            });
        }

            document.getElementById('form').addEventListener('submit', e => {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value.trim() && chatAtivo) {
                db.ref('chats/' + chatAtivo).push({ texto: input.value, sender: meuId });
                input.value = '';
            }
        });
    </script>
</body>
</html>
