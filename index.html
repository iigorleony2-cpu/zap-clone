<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V26.0 - Dispositivos</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        /* Estilos baseados nas versões anteriores para manter a responsividade */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; padding: 20px; }
        .login-box { background: #0b4e41; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        #login-screen input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 15px; font-size: 16px; width: 100%; }
        
        #app-container { display: none; width: 100%; height: 100%; flex-direction: row; position: relative; }

        /* SIDEBAR */
        #sidebar { width: 30%; min-width: 300px; max-width: 450px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; height: 100%; }
        #sidebar-header { background: #ededed; padding: 15px; font-weight: bold; height: 60px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        #user-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        
        .user-item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; cursor: pointer; background: #fff; position: relative; }
        .avatar-container { position: relative; margin-right: 15px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #ccc; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 2px; right: 2px; }
        .online { background: #25d366; }
        .offline { background: #bbb; }
        
        /* TEXTO DO DISPOSITIVO */
        .device-info { font-size: 12px; color: #888; font-weight: normal; margin-left: 5px; }

        /* CHAT AREA */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; z-index: 20; height: 100%; }
        #chat-header { background: #ededed; padding: 0 10px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; }
        .back-btn { background: #075e54; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; font-size: 18px; cursor: pointer; display: none; align-items: center; justify-content: center; }

        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px 18px 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; min-width: 90px; margin-bottom: 10px; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        .msg-time { position: absolute; bottom: 3px; right: 8px; font-size: 9px; color: rgba(0, 0, 0, 0.45); }

        #footer-container { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; }
        #form { display: flex; align-items: center; gap: 8px; }
        input#input { flex-grow: 1; border: none; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; background: white; }
        .btn-circle { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; max-width: none; position: absolute; left: 0; top: 0; }
            #chat-area { width: 100%; position: absolute; left: 0; top: 0; transform: translateX(100%); transition: 0.3s ease; }
            body.chat-aberto #chat-area { transform: translateX(0); }
            .back-btn { display: flex; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Zap Pro</h2>
            <img id="preview-img" style="width:100px; height:100px; border-radius:50%; object-fit:cover; display:none; margin:10px auto; border:3px solid #fff;">
            <input type="text" id="login-nome" placeholder="Seu nome">
            <label style="display:block; background:#25d366; padding:12px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-weight:bold; text-align:center;" for="login-foto">📸 Foto Perfil</label>
            <input type="file" id="login-foto" accept="image/*" style="display:none;" onchange="previewFoto(this)">
            <button onclick="fazerLogin()" style="width:100%; padding:15px; border-radius:8px; border:none; background:#25d366; color:white; font-weight:bold;">ENTRAR</button>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div id="sidebar-header">Conversas</div>
            <ul id="user-list" onclick="detectarToque(event)"></ul>
        </div>
        <div id="chat-area">
            <div id="chat-header">
                <div class="header-left">
                    <button class="back-btn" onclick="fecharChatNoMobile()">❮</button>
                    <div class="header-info">
                        <span id="nome-contato">Selecione um contato</span>
                        <span id="status-contato" style="font-size: 11px; font-weight: normal; color: #666; display: block;"></span>
                    </div>
                </div>
            </div>
            <ul id="messages"></ul>
            <div id="footer-container" style="display: none;">
                <form id="form" onsubmit="processarEnvio(event)">
                    <label style="cursor:pointer; font-size:22px;">🖼️ <input type="file" accept="image/*" style="display:none" onchange="enviarArquivo(this, 'foto')"></label>
                    <label style="cursor:pointer; font-size:22px;">📷 <input type="file" accept="image/*" capture="environment" style="display:none" onchange="enviarArquivo(this, 'foto')"></label>
                    <input id="input" placeholder="Digite uma mensagem..." autocomplete="off">
                    <button type="submit" class="btn-circle">➤</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone",
            storageBucket: "meu-zap-clone.firebasestorage.app",
            messagingSenderId: "972529173490",
            appId: "1:972529173490:web:b8444d778ebe5ed897216b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome, minhaFotoBase64, meuId, chatAtivo;

        // FUNÇÃO PARA DETECTAR O DISPOSITIVO
        function detectarDispositivo() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android|iphone|ipad|ipod/i.test(userAgent)) {
                return "Smartphone";
            }
            return "PC";
        }

        if(localStorage.getItem('zap_id')) { fazerLogin(true); }

        function fazerLogin(automatico = false) {
            let dispositivo = detectarDispositivo();
            
            if(!automatico) {
                meuNome = document.getElementById('login-nome').value.trim();
                if(!meuNome) return;
                minhaFotoBase64 = minhaFotoBase64 || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                meuId = meuNome.toLowerCase().replace(/\s/g, '');
                localStorage.setItem('zap_nome', meuNome);
                localStorage.setItem('zap_foto', minhaFotoBase64);
                localStorage.setItem('zap_id', meuId);
            } else {
                meuNome = localStorage.getItem('zap_nome');
                minhaFotoBase64 = localStorage.getItem('zap_foto');
                meuId = localStorage.getItem('zap_id');
            }
            
            // Salva o nome e o dispositivo no Firebase
            db.ref('usuarios/' + meuId).update({ 
                nome: meuNome, 
                foto: minhaFotoBase64,
                dispositivo: dispositivo 
            });
            
            db.ref('status/' + meuId).set('online');
            db.ref('status/' + meuId).onDisconnect().set('offline');
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            iniciarSistema();
        }

        function iniciarSistema() {
            db.ref('usuarios').on('value', snapshot => {
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';
                snapshot.forEach(child => {
                    if(child.key !== meuId) {
                        const user = child.val();
                        const dispositivo = user.dispositivo ? `(${user.dispositivo})` : "";
                        const li = document.createElement('li');
                        li.className = 'user-item';
                        li.dataset.id = child.key;
                        li.dataset.nome = user.nome;
                        li.innerHTML = `
                            <div class="avatar-container">
                                <img src="${user.foto}" class="avatar">
                                <div id="dot-${child.key}" class="status-dot offline"></div>
                            </div>
                            <div style="display:flex; align-items: center; flex-grow:1;">
                                <span style="font-weight:bold;">${user.nome}</span>
                                <span class="device-info">${dispositivo}</span>
                            </div>
                        `;
                        userList.appendChild(li);
                        
                        db.ref('status/' + child.key).on('value', stSnap => {
                            const dot = document.getElementById('dot-' + child.key);
                            if(dot) dot.className = 'status-dot ' + (stSnap.val() === 'online' ? 'online' : 'offline');
                        });
                    }
                });
            });
        }

        // Funções de navegação e chat permanecem as mesmas das versões anteriores
        function detectarToque(e) { const it = e.target.closest('.user-item'); if(it) abrirChat(it.dataset.id, it.dataset.nome); }
        function fecharChatNoMobile() { document.body.classList.remove('chat-aberto'); }
        function abrirChat(id, nome) { 
            chatAtivo = [meuId, id].sort().join('_'); 
            document.getElementById('nome-contato').innerText = nome;
            document.getElementById('footer-container').style.display = 'block';
            document.body.classList.add('chat-aberto');
            carregarMensagens(); 
        }
        
        function carregarMensagens() {
            const mList = document.getElementById('messages');
            db.ref('chats/' + chatAtivo).on('value', snapshot => {
                mList.innerHTML = '';
                snapshot.forEach(child => {
                    const msg = child.val(); const isSent = msg.sender === meuId;
                    const line = document.createElement('li'); line.className = 'msg-line';
                    const divMsg = document.createElement('div');
                    divMsg.className = 'msg ' + (isSent ? 'sent' : 'received');
                    divMsg.innerHTML = `${msg.texto}<span class="msg-time">${msg.data_hora || ''}</span>`;
                    line.appendChild(divMsg); mList.appendChild(line);
                });
                mList.scrollTop = mList.scrollHeight;
            });
        }

        function processarEnvio(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            const texto = input.value.trim();
            if(!texto) return;
            const agora = new Date();
            const dataHora = agora.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) + ' ' + agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0');
            db.ref('chats/' + chatAtivo).push({ texto: texto, sender: meuId, tipo: 'texto', data_hora: dataHora });
            input.value = '';
        }

        function previewFoto(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = e => { document.getElementById('preview-img').src = e.target.result; document.getElementById('preview-img').style.display='block'; minhaFotoBase64=e.target.result; };
                r.readAsDataURL(i.files[0]);
            }
        }
    </script>
</body>
</html>
