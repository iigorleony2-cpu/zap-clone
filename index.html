<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V8.3</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; }
        .login-box { background: #0b4e41; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        #login-screen input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 15px; font-size: 16px; }
        
        /* APP */
        #app-container { display: none; width: 100%; height: 100%; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; }
        #sidebar-header { background: #ededed; padding: 10px 15px; font-weight: bold; height: 60px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        
        #user-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .user-item { 
            padding: 12px 15px; 
            border-bottom: 1px solid #f2f2f2; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            position: relative; 
            width: 100%;
            background: #fff;
            user-select: none;
        }
        .user-item:active { background: #ebebeb; }
        
        /* Impede que sub-elementos capturem o toque */
        .user-item img, .user-item span, .user-item div { pointer-events: none; } 
        
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #ccc; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; position: absolute; left: 45px; bottom: 12px; border: 2px solid white; }
        .online { background: #25d366; }
        .offline { background: #bbb; }

        /* CHAT */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }
        #chat-header { background: #ededed; padding: 10px 15px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; }
        .back-btn { display: none; background: #075e54; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; cursor: pointer; justify-content: center; align-items: center; font-size: 18px; }
        
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px; margin-bottom: 5px; border-radius: 8px; max-width: 85%; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        
        .msg-options { display: none; position: absolute; top: -35px; right: 0; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 50; }
        .msg.show-options .msg-options { display: block; }

        #footer-container { background: #f0f0f0; padding: 10px; border-top: 1px solid #ddd; position: relative; min-height: 65px; }
        #form { display: flex; align-items: center; width: 100%; }
        input#input { flex-grow: 1; border: none; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; background: #fff; }
        .btn-icon { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; margin-left: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        
        #recording-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f0f0; display: none; align-items: center; padding: 0 15px; z-index: 5; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; }
            #chat-area { width: 100%; position: absolute; height: 100%; left: 100%; transition: transform 0.2s ease-in-out; }
            body.chat-aberto #chat-area { left: 0; }
            .back-btn { display: flex; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Zap Pro</h2>
            <img id="preview-img" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; display:none; margin:10px auto; border:3px solid #fff;">
            <input type="text" id="login-nome" placeholder="Seu nome">
            <label style="display:block; background:#25d366; padding:12px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-weight:bold;" for="login-foto">📸 Foto de Perfil</label>
            <input type="file" id="login-foto" accept="image/*" style="display:none;" onchange="previewFoto(this)">
            <button onclick="fazerLogin()" style="width:100%; padding:15px; border-radius:8px; border:none; background:#25d366; color:white; font-weight:bold; cursor:pointer;">ENTRAR</button>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div id="sidebar-header">Conversas</div>
            <ul id="user-list"></ul>
        </div>
        <div id="chat-area">
            <div id="chat-header">
                <button class="back-btn" onclick="document.body.classList.remove('chat-aberto')">❮</button>
                <span id="nome-contato">Selecione um contato</span>
            </div>
            <ul id="messages" onclick="fecharOpcoes()"></ul>
            <div id="footer-container" style="display:none;">
                <form id="form">
                    <input id="input" placeholder="Digite uma mensagem..." autocomplete="off">
                    <button type="submit" class="btn-icon">➤</button>
                    <button type="button" class="btn-icon" onclick="iniciarGravacao()">🎤</button>
                </form>
                <div id="recording-ui">
                    <button style="background:none; border:none; font-size:22px;" onclick="cancelarGravacao()">🗑️</button>
                    <div style="width:10px; height:10px; background:red; border-radius:50%; margin:0 10px;"></div>
                    <div id="timer-display" style="flex-grow:1;">0:00</div>
                    <button class="btn-icon" style="background:#00a884" onclick="pararESEnviar()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU",
            authDomain: "meu-zap-clone.firebaseapp.com",
            databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/",
            projectId: "meu-zap-clone",
            storageBucket: "meu-zap-clone.firebasestorage.app",
            messagingSenderId: "972529173490",
            appId: "1:972529173490:web:b8444d778ebe5ed897216b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome, minhaFotoBase64, meuId, chatAtivo, mediaRecorder, audioChunks = [], timerInterval, segundos = 0;

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById('preview-img');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    minhaFotoBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        if(localStorage.getItem('zap_id')) { fazerLogin(true); }

        function fazerLogin(automatico = false) {
            if(!automatico) {
                meuNome = document.getElementById('login-nome').value.trim();
                if(!meuNome) return alert("Digite seu nome!");
                minhaFotoBase64 = minhaFotoBase64 || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                meuId = meuNome.toLowerCase().replace(/\s/g, '');
                localStorage.setItem('zap_nome', meuNome);
                localStorage.setItem('zap_foto', minhaFotoBase64);
                localStorage.setItem('zap_id', meuId);
            } else {
                meuNome = localStorage.getItem('zap_nome');
                minhaFotoBase64 = localStorage.getItem('zap_foto');
                meuId = localStorage.getItem('zap_id');
            }
            db.ref('usuarios/' + meuId).set({ nome: meuNome, foto: minhaFotoBase64 });
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            iniciarSistema();
        }

        function iniciarSistema() {
            db.ref('online/' + meuId).set(true);
            db.ref('online/' + meuId).onDisconnect().remove();

            db.ref('usuarios').on('value', snapshot => {
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';
                snapshot.forEach(child => {
                    if(child.key !== meuId) {
                        const user = child.val();
                        const li = document.createElement('li');
                        li.className = 'user-item';
                        li.innerHTML = `
                            <img src="${user.foto}" class="avatar">
                            <span>${user.nome}</span>
                            <div class="status-indicator offline" id="status-${child.key}"></div>
                        `;
                        
                        // EVENTO DE TOQUE REFORÇADO PARA CELULAR
                        const triggerChat = (e) => {
                            e.preventDefault();
                            abrirChat(child.key, user.nome);
                        };
                        
                        li.addEventListener('mousedown', triggerChat); 
                        li.addEventListener('touchstart', triggerChat, {passive: false});

                        userList.appendChild(li);
                    }
                });
            });

            db.ref('online').on('value', snapshot => {
                const onlines = snapshot.val() || {};
                document.querySelectorAll('.status-indicator').forEach(el => {
                    const id = el.id.replace('status-', '');
                    el.className = 'status-indicator ' + (onlines[id] ? 'online' : 'offline');
                });
            });
        }

        function abrirChat(idDestino, nomeDestino) {
            chatAtivo = [meuId, idDestino].sort().join('_');
            document.getElementById('nome-contato').innerText = nomeDestino;
            document.getElementById('footer-container').style.display = 'block';
            document.body.classList.add('chat-aberto');
            carregarMensagens();
        }

        function carregarMensagens() {
            const mList = document.getElementById('messages');
            db.ref('chats/' + chatAtivo).off();
            db.ref('chats/' + chatAtivo).on('value', snapshot => {
                mList.innerHTML = '';
                snapshot.forEach(child => {
                    const msg = child.val();
                    const msgId = child.key;
                    const li = document.createElement('li');
                    li.className = 'msg ' + (msg.sender === meuId ? 'sent' : 'received');
                    if(msg.excluida) {
                        li.innerHTML = `<span style="font-style:italic; color:#888;">🚫 Mensagem apagada</span>`;
                    } else {
                        if(msg.tipo === 'audio') li.innerHTML = `<audio controls src="${msg.audio}"></audio>`;
                        else li.textContent = msg.texto;
                        
                        if(msg.sender === meuId) {
                            li.onclick = (e) => {
                                e.stopPropagation();
                                fecharOpcoes();
                                li.classList.add('show-options');
                            };
                            const menu = document.createElement('div');
                            menu.className = 'msg-options';
                            menu.innerHTML = `<button style="color:red; border:none; background:none; font-weight:bold;" onclick="excluirParaTodos(event, '${msgId}')">Apagar para todos</button>`;
                            li.appendChild(menu);
                        }
                    }
                    mList.appendChild(li);
                });
                mList.scrollTop = mList.scrollHeight;
            });
        }

        function fecharOpcoes() { document.querySelectorAll('.msg').forEach(m => m.classList.remove('show-options')); }
        
        function excluirParaTodos(e, msgId) {
            e.stopPropagation();
            if(confirm("Apagar mensagem?")) db.ref('chats/' + chatAtivo + '/' + msgId).update({ excluida: true, texto: null, audio: null });
            fecharOpcoes();
        }

        document.getElementById('form').addEventListener('submit', e => {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value.trim() && chatAtivo) {
                db.ref('chats/' + chatAtivo).push({ texto: input.value, sender: meuId, tipo: 'texto', excluida: false });
                input.value = '';
            }
        });

        async function iniciarGravacao() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    if(audioChunks.length > 0) {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => db.ref('chats/' + chatAtivo).push({ audio: reader.result, sender: meuId, tipo: 'audio', excluida: false });
                        reader.readAsDataURL(audioBlob);
                    }
                };
                mediaRecorder.start();
                document.getElementById('recording-ui').style.display = 'flex';
                segundos = 0;
                timerInterval = setInterval(() => {
                    segundos++;
                    const min = Math.floor(segundos / 60);
                    const seg = segundos % 60;
                    document.getElementById('timer-display').innerText = `${min}:${seg < 10 ? '0' : ''}${seg}`;
                }, 1000);
            } catch (err) { alert("Microfone bloqueado."); }
        }
        function cancelarGravacao() { if (mediaRecorder) { audioChunks = []; mediaRecorder.stop(); fecharUIGravacao(); } }
        function pararESEnviar() { if (mediaRecorder) { mediaRecorder.stop(); fecharUIGravacao(); } }
        function fecharUIGravacao() { clearInterval(timerInterval); document.getElementById('recording-ui').style.display = 'none'; }
    </script>
</body>
</html>
