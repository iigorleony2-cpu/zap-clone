<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Pro V29.9</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --chat-font-size: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #075e54; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* TELA DE LOADING */
        #loading-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: flex; align-items: center; justify-content: center; z-index: 3000; color: white; flex-direction: column; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid #fff; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* AUTH SCREENS */
        .auth-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #075e54; display: none; align-items: center; justify-content: center; z-index: 2000; color: white; padding: 20px; }
        .auth-box { background: #0b4e41; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        .auth-box input { padding: 12px; border-radius: 8px; border: none; width: 100%; margin-bottom: 12px; font-size: 16px; color: #333; }
        .auth-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; }
        .link-text { cursor: pointer; font-size: 13px; margin-top: 15px; display: block; color: #add8e6; text-decoration: underline; }

        /* APP LAYOUT */
        #app-container { display: none; width: 100%; height: 100%; background: #fff; }
        #sidebar { width: 30%; min-width: 300px; max-width: 450px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; position: relative; }
        #settings-panel, #search-panel { position: absolute; left: -100%; top: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 100; transition: 0.3s ease; display: flex; flex-direction: column; }
        #settings-panel.open, #search-panel.open { left: 0; }
        .panel-header { background: #008069; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px 18px 10px; border-radius: 8px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; margin-bottom: 10px; font-size: var(--chat-font-size); }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; }
            #chat-area { width: 100%; position: absolute; transform: translateX(100%); transition: 0.3s; }
            body.chat-aberto #chat-area { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div><span>Zap Pro está carregando...</span></div>

    <div id="auth-screen" class="auth-screen">
        <!-- LOGIN -->
        <div class="auth-box" id="login-box">
            <h2>Zap Pro</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button onclick="realizarLogin()">ENTRAR</button>
            <!-- LINK REATIVADO -->
            <span class="link-text" onclick="enviarRecuperacao()">Esqueci minha senha</span>
            <p onclick="alternarAuth('signup')" style="cursor:pointer; font-size:12px; margin-top:15px;">Novo aqui? <b>Cadastre-se</b></p>
        </div>

        <!-- CADASTRO -->
        <div class="auth-box" id="signup-box" style="display:none;">
            <h2>Criar Conta</h2>
            <input type="text" id="reg-nome" placeholder="Apelido">
            <input type="text" id="reg-at" placeholder="Seu @ (ex: igor.leony)">
            <input type="email" id="reg-email" placeholder="E-mail real">
            <input type="password" id="reg-pass" placeholder="Senha">
            <button onclick="registrarUsuario()">CADASTRAR</button>
            <p onclick="alternarAuth('login')" style="cursor:pointer; font-size:12px; margin-top:15px;">Já tem conta? <b>Login</b></p>
        </div>
    </div>

    <div id="app-container">
        <!-- Estrutura do Sidebar e Chat se mantém -->
        <div id="sidebar">
            <div id="settings-panel">
                <div class="panel-header"><span style="cursor:pointer;" onclick="toggleSettings()">❮</span><span>Configurações</span></div>
                <div style="padding:20px;">
                    <img id="set-foto-preview" src="" style="width:100px; height:100px; border-radius:50%; display:block; margin:0 auto 10px; cursor:pointer;" onclick="document.getElementById('set-foto-input').click()">
                    <input type="file" id="set-foto-input" accept="image/*" style="display:none;" onchange="uploadFoto(this)">
                    <input type="text" id="set-nome-input" style="width:100%; border:none; border-bottom:2px solid #008069; padding:10px 0; margin-bottom:20px;">
                    <button onclick="salvarPerfil()" style="width:100%; padding:15px; background:#25d366; color:white; border:none; border-radius:8px;">SALVAR</button>
                    <button onclick="fazerLogout()" style="width:100%; margin-top:30px; padding:10px; background:none; border:1px solid #ff4d4d; color:#ff4d4d; border-radius:8px;">SAIR</button>
                </div>
            </div>
            <!-- ... Outros painéis e listas ... -->
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCcaX5fOlNx6OGdcGfTkFZ3UxnYS_uM9rU", authDomain: "meu-zap-clone.firebaseapp.com", databaseURL: "https://meu-zap-clone-default-rtdb.firebaseio.com/", projectId: "meu-zap-clone" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        let meuUserAt = ""; let fotoTempBase64 = "";

        // MONITOR DE LOGIN (PERSISTÊNCIA)
        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loading-screen');
            if (user) {
                db.ref('uids/' + user.uid).once('value', s => {
                    meuUserAt = s.val();
                    if (meuUserAt) { entrarNoApp(); loading.style.display = 'none'; }
                });
            } else {
                loading.style.display = 'none';
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        // LOGIN COM ERROS TRADUZIDOS
        function realizarLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            if(!email || !pass) return alert("Preencha e-mail e senha.");

            auth.signInWithEmailAndPassword(email, pass).catch(error => {
                if(error.code === 'auth/invalid-login-credentials' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    alert("Ops! E-mail ou senha incorretos. Verifique os dados e tente novamente.");
                } else {
                    alert("Erro ao entrar: " + error.message);
                }
            });
        }

        // RECUPERAÇÃO DE SENHA
        function enviarRecuperacao() {
            const email = document.getElementById('login-email').value.trim();
            if(!email) return alert("Por favor, digite seu e-mail no campo acima para receber o link de recuperação.");
            
            auth.sendPasswordResetEmail(email).then(() => {
                alert("E-mail de recuperação enviado! Verifique sua caixa de entrada (e a pasta de spam).");
            }).catch(error => {
                alert("Não conseguimos enviar o e-mail: " + error.message);
            });
        }

        function registrarUsuario() {
            const nome = document.getElementById('reg-nome').value.trim();
            const at = document.getElementById('reg-at').value.trim().toLowerCase().replace(/\s/g, '').replace(/[^a-z0-9._]/g, '');
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            if(!nome || !at || !email || !pass) return alert("Preencha tudo!");

            db.ref('usuarios/'+at).once('value', s => {
                if(s.exists()) return alert("Este @ já está em uso.");
                auth.createUserWithEmailAndPassword(email, pass).then(res => {
                    db.ref('usuarios/'+at).set({ nome, at: '@'+at, email, uid: res.user.uid, foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png" });
                    db.ref('uids/'+res.user.uid).set(at);
                }).catch(e => alert(e.message));
            });
        }

        function entrarNoApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            // Resto da lógica de carregamento de perfil e tabs (mesma da v29.8)...
        }

        function fazerLogout() { if(confirm("Deseja sair da conta?")) auth.signOut().then(() => location.reload()); }
        function alternarAuth(t) { document.getElementById('login-box').style.display = t==='login'?'block':'none'; document.getElementById('signup-box').style.display = t==='signup'?'block':'none'; }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }
        // ... (Adicione aqui as funções de busca e chat da versão anterior para completar o arquivo)
    </script>
</body>
</html>
