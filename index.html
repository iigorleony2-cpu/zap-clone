<!DOCTYPE html>
<html>
<head>
    <title>Zap Clone GitHub</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        /* O mesmo estilo CSS de antes funciona aqui */
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; list-style: none; }
        .msg { padding: 8px; margin: 5px; border-radius: 8px; max-width: 70%; }
        .sent { background: #dcf8c6; margin-left: auto; }
        .received { background: #fff; }
        #form { display: flex; padding: 10px; background: #eee; }
        input { flex-grow: 1; border-radius: 20px; border: none; padding: 10px; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" placeholder="Digite uma mensagem...">
        <button type="submit">Enviar</button>
    </form>

    <script>
        // Configurações do seu projeto no Google Firebase
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            databaseURL: "SUA_URL_DO_DATABASE",
            projectId: "SEU_ID_DO_PROJETO"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messagesList = document.getElementById('messages');

        // Enviar mensagem para o Google
        form.addEventListener('submit', e => {
            e.preventDefault();
            if (input.value) {
                db.ref('mensagens').push({
                    texto: input.value,
                    hora: Date.now()
                });
                input.value = '';
            }
        });

        // Ouvir mensagens novas do Google e mostrar na tela
        db.ref('mensagens').on('child_added', snapshot => {
            const msg = snapshot.val();
            const li = document.createElement('li');
            li.textContent = msg.texto;
            li.className = 'msg received';
            messagesList.appendChild(li);
        });
    </script>
</body>
</html>
